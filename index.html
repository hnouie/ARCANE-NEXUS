<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCANE NEXUS: SCI-FI MAGE ARENA</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            background: #050510;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        
        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        .ui-overlay {
            position: absolute;
            pointer-events: none;
            z-index: 100;
        }
        
        /* CRT Scanline Effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.1) 50%,
                rgba(0,0,0,0.1)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1000;
            animation: scanlineMove 10s linear infinite;
        }
        
        @keyframes scanlineMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }
        
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>

        // ==========================================
        // SCENE: BOOT
        // ==========================================
        class BootScene extends Phaser.Scene {
            constructor() {
                super({ key: 'BootScene' });
            }

            preload() {
                // Create procedural textures
                this.load.setBaseURL('');
                
                // Generate textures programmatically
                this.createPlayerTexture();
                this.createEnemyTexture();
                this.createProjectileTexture();
                this.createSkillTextures();
                this.createUITextures();
                this.createEnvironmentTextures();
            }

            createPlayerTexture() {
                const graphics = this.make.graphics({ x: 0, y: 0, add: false });
                
                // Base mage circle
                graphics.fillStyle(0xffffff);
                graphics.fillCircle(32, 32, 30);
                graphics.generateTexture('player_base', 64, 64);
                graphics.clear();
                
                // Aura effect
                for (let i = 0; i < 3; i++) {
                    graphics.lineStyle(2, 0xffffff, 0.3 - i * 0.1);
                    graphics.strokeCircle(32, 32, 35 + i * 5);
                }
                graphics.generateTexture('aura', 64, 64);
            }

            createEnemyTexture() {
                const graphics = this.make.graphics({ x: 0, y: 0, add: false });
                
                // Aggressive enemy
                graphics.fillStyle(ENEMY_TYPES.AGGRESSIVE.color);
                graphics.beginPath();
                graphics.moveTo(32, 8);
                graphics.lineTo(56, 48);
                graphics.lineTo(8, 48);
                graphics.closePath();
                graphics.fillPath();
                graphics.generateTexture('enemy_aggressive', 64, 64);
                graphics.clear();
                
                // Tactical enemy
                graphics.fillStyle(ENEMY_TYPES.TACTICAL.color);
                graphics.fillRect(16, 16, 32, 32);
                graphics.generateTexture('enemy_tactical', 64, 64);
                graphics.clear();
                
                // Support enemy
                graphics.fillStyle(ENEMY_TYPES.SUPPORT.color);
                graphics.fillCircle(32, 32, 24);
                graphics.generateTexture('enemy_support', 64, 64);
                graphics.clear();
                
                // Boss
                graphics.fillStyle(ENEMY_TYPES.BOSS.color);
                graphics.beginPath();
                graphics.moveTo(32, 8);
                graphics.lineTo(56, 24);
                graphics.lineTo(56, 40);
                graphics.lineTo(32, 56);
                graphics.lineTo(8, 40);
                graphics.lineTo(8, 24);
                graphics.closePath();
                graphics.fillPath();
                graphics.generateTexture('enemy_boss', 64, 64);
            }

            createProjectileTexture() {
                const graphics = this.make.graphics({ x: 0, y: 0, add: false });
                
                // Plasma bolt
                graphics.fillStyle(0xff4400);
                graphics.fillEllipse(16, 8, 32, 16);
                graphics.generateTexture('proj_plasma', 32, 16);
                graphics.clear();
                
                // Lightning
                graphics.lineStyle(3, 0x00ffff);
                graphics.beginPath();
                graphics.moveTo(0, 0);
                graphics.lineTo(16, 8);
                graphics.lineTo(8, 16);
                graphics.lineTo(24, 24);
                graphics.strokePath();
                graphics.generateTexture('proj_lightning', 32, 32);
                graphics.clear();
                
                // Void orb
                graphics.fillStyle(0x9d00ff);
                graphics.fillCircle(16, 16, 14);
                graphics.lineStyle(2, 0xffffff, 0.5);
                graphics.strokeCircle(16, 16, 14);
                graphics.generateTexture('proj_void', 32, 32);
                graphics.clear();
                
                // Nano swarm
                for (let i = 0; i < 5; i++) {
                    graphics.fillStyle(0x00ff88);
                    graphics.fillCircle(8 + i * 6, 16 + Math.sin(i) * 8, 3);
                }
                graphics.generateTexture('proj_nano', 32, 32);
            }

            createSkillTextures() {
                const graphics = this.make.graphics({ x: 0, y: 0, add: false });
                
                // Skill icons (64x64)
                const skills = ['void', 'flame', 'lightning', 'chrono', 'nano'];
                const colors = [0x9d00ff, 0xff4400, 0x00ffff, 0xffd700, 0x00ff88];
                
                skills.forEach((skill, idx) => {
                    graphics.clear();
                    // Background
                    graphics.fillStyle(0x1a1a2e);
                    graphics.fillRect(0, 0, 64, 64);
                    // Border
                    graphics.lineStyle(3, colors[idx]);
                    graphics.strokeRect(2, 2, 60, 60);
                    // Symbol
                    graphics.fillStyle(colors[idx]);
                    if (skill === 'void') {
                        graphics.fillCircle(32, 32, 20);
                        graphics.fillStyle(0x1a1a2e);
                        graphics.fillCircle(32, 32, 12);
                    } else if (skill === 'flame') {
                        graphics.beginPath();
                        graphics.moveTo(32, 12);
                        graphics.lineTo(44, 40);
                        graphics.lineTo(32, 36);
                        graphics.lineTo(20, 40);
                        graphics.closePath();
                        graphics.fillPath();
                    } else if (skill === 'lightning') {
                        graphics.beginPath();
                        graphics.moveTo(28, 12);
                        graphics.lineTo(36, 28);
                        graphics.lineTo(28, 28);
                        graphics.lineTo(36, 52);
                        graphics.lineTo(24, 32);
                        graphics.lineTo(32, 32);
                        graphics.closePath();
                        graphics.fillPath();
                    } else if (skill === 'chrono') {
                        graphics.beginPath();
                        graphics.arc(32, 32, 18, 0, Math.PI * 1.5);
                        graphics.lineStyle(4, colors[idx]);
                        graphics.strokePath();
                        graphics.fillStyle(colors[idx]);
                        graphics.fillRect(30, 14, 4, 20);
                        graphics.fillRect(30, 30, 14, 4);
                    } else if (skill === 'nano') {
                        for (let i = 0; i < 3; i++) {
                            for (let j = 0; j < 3; j++) {
                                graphics.fillCircle(20 + i * 12, 20 + j * 12, 4);
                            }
                        }
                    }
                    graphics.generateTexture(`skill_${skill}`, 64, 64);
                });
            }

            createUITextures() {
                const graphics = this.make.graphics({ x: 0, y: 0, add: false });
                
                // Joystick base
                graphics.fillStyle(0x000000, 0.5);
                graphics.fillCircle(64, 64, 60);
                graphics.lineStyle(2, 0xffffff, 0.3);
                graphics.strokeCircle(64, 64, 60);
                graphics.generateTexture('joystick_base', 128, 128);
                graphics.clear();
                
                // Joystick stick
                graphics.fillStyle(0xffffff, 0.8);
                graphics.fillCircle(32, 32, 25);
                graphics.generateTexture('joystick_stick', 64, 64);
                graphics.clear();
                
                // Energy bar bg
                graphics.fillStyle(0x000000, 0.7);
                graphics.fillRect(0, 0, 200, 20);
                graphics.generateTexture('bar_bg', 200, 20);
                graphics.clear();
                
                // Overload bar
                graphics.fillStyle(0xff0044);
                graphics.fillRect(0, 0, 200, 20);
                graphics.generateTexture('bar_overload', 200, 20);
                graphics.clear();
                
                // Energy fill
                graphics.fillStyle(0x00aaff);
                graphics.fillRect(0, 0, 200, 20);
                graphics.generateTexture('bar_energy', 200, 20);
                graphics.clear();
                
                // Health fill
                graphics.fillStyle(0x00ff44);
                graphics.fillRect(0, 0, 200, 20);
                graphics.generateTexture('bar_health', 200, 20);
                graphics.clear();
            }

            createEnvironmentTextures() {
                const graphics = this.make.graphics({ x: 0, y: 0, add: false });
                
                // Floor tile
                graphics.fillStyle(0x0a0a1a);
                graphics.fillRect(0, 0, 64, 64);
                graphics.lineStyle(1, 0x1a1a3a);
                graphics.strokeRect(0, 0, 64, 64);
                graphics.generateTexture('floor_tile', 64, 64);
                graphics.clear();
                
                // Wall
                graphics.fillStyle(0x2a2a4a);
                graphics.fillRect(0, 0, 64, 64);
                graphics.lineStyle(2, 0x4a4a6a);
                graphics.strokeRect(0, 0, 64, 64);
                graphics.generateTexture('wall', 64, 64);
                graphics.clear();
                
                // Teleporter
                graphics.fillStyle(0x00ffff, 0.3);
                graphics.fillCircle(32, 32, 30);
                graphics.lineStyle(2, 0x00ffff);
                graphics.strokeCircle(32, 32, 30);
                graphics.generateTexture('teleporter', 64, 64);
                graphics.clear();
                
                // Hazard
                graphics.fillStyle(0xff0044, 0.3);
                graphics.fillRect(0, 0, 64, 64);
                graphics.lineStyle(2, 0xff0044);
                graphics.strokeRect(0, 0, 64, 64);
                graphics.generateTexture('hazard', 64, 64);
            }

            create() {
                this.scene.start('MenuScene');
            }
        }

        // ==========================================
        // SCENE: MENU
        // ==========================================
        class MenuScene extends Phaser.Scene {
            constructor() {
                super({ key: 'MenuScene' });
            }

            create() {
                // Background
                this.createStarfield();
                
                // Title
                const title = this.add.text(this.cameras.main.centerX, 80, 'ARCANE NEXUS', {
                    fontFamily: 'Courier New',
                    fontSize: '48px',
                    fontStyle: 'bold',
                    color: '#00aaff'
                }).setOrigin(0.5);
                
                const subtitle = this.add.text(this.cameras.main.centerX, 130, 'SCI-FI MAGE ARENA', {
                    fontFamily: 'Courier New',
                    fontSize: '24px',
                    color: '#ff00ff'
                }).setOrigin(0.5);
                
                // Glitch effect on title
                this.tweens.add({
                    targets: title,
                    x: '+=2',
                    duration: 50,
                    yoyo: true,
                    repeat: -1,
                    repeatDelay: 2000
                });
                
                // Menu options
                const menuItems = [
                    { text: '1v1 DUEL', scene: 'GameScene', mode: 'duel' },
                    { text: '3v3 ARENA', scene: 'GameScene', mode: 'arena' },
                    { text: 'SURVIVAL', scene: 'GameScene', mode: 'survival' },
                    { text: 'BOSS MODE', scene: 'GameScene', mode: 'boss' },
                    { text: 'MAGE SELECT', scene: 'SelectScene' }
                ];
                
                let y = 250;
                menuItems.forEach((item, index) => {
                    const button = this.add.container(this.cameras.main.centerX, y);
                    
                    const bg = this.add.rectangle(0, 0, 280, 50, 0x1a1a3a)
                        .setStrokeStyle(2, 0x00aaff);
                    
                    const text = this.add.text(0, 0, item.text, {
                        fontFamily: 'Courier New',
                        fontSize: '20px',
                        color: '#ffffff'
                    }).setOrigin(0.5);
                    
                    button.add([bg, text]);
                    button.setSize(280, 50);
                    button.setInteractive();
                    
                    button.on('pointerover', () => {
                        bg.setFillStyle(0x2a2a5a);
                        text.setColor('#00ffff');
                    });
                    
                    button.on('pointerout', () => {
                        bg.setFillStyle(0x1a1a3a);
                        text.setColor('#ffffff');
                    });
                    
                    button.on('pointerdown', () => {
                        if (item.scene === 'GameScene') {
                            this.scene.start(item.scene, { mode: item.mode, mageClass: 'void' });
                        } else {
                            this.scene.start(item.scene);
                        }
                    });
                    
                    y += 70;
                });
                
                // Version info
                this.add.text(20, this.cameras.main.height - 30, 'v1.0.0 OFFLINE BUILD', {
                    fontFamily: 'Courier New',
                    fontSize: '12px',
                    color: '#666666'
                });
            }

            createStarfield() {
                const graphics = this.add.graphics();
                for (let i = 0; i < 200; i++) {
                    const x = Phaser.Math.Between(0, this.cameras.main.width);
                    const y = Phaser.Math.Between(0, this.cameras.main.height);
                    const size = Phaser.Math.FloatBetween(0.5, 2);
                    const alpha = Phaser.Math.FloatBetween(0.3, 1);
                    graphics.fillStyle(0xffffff, alpha);
                    graphics.fillCircle(x, y, size);
                }
            }
        }

        // ==========================================
        // SCENE: MAGE SELECT
        // ==========================================
        class SelectScene extends Phaser.Scene {
            constructor() {
                super({ key: 'SelectScene' });
            }

            create() {
                this.createStarfield();
                
                this.add.text(this.cameras.main.centerX, 40, 'SELECT YOUR MAGE', {
                    fontFamily: 'Courier New',
                    fontSize: '32px',
                    color: '#ffffff'
                }).setOrigin(0.5);
                
                const classes = Object.values(MAGE_CLASSES);
                const startX = 100;
                const spacing = 140;
                
                classes.forEach((mage, index) => {
                    const x = startX + index * spacing;
                    const y = 200;
                    
                    const container = this.add.container(x, y);
                    
                    // Mage preview
                    const circle = this.add.circle(0, 0, 50, mage.color);
                    const inner = this.add.circle(0, 0, 40, 0x000000);
                    const letter = this.add.text(0, 0, mage.name[0], {
                        fontFamily: 'Courier New',
                        fontSize: '36px',
                        fontStyle: 'bold',
                        color: '#ffffff'
                    }).setOrigin(0.5);
                    
                    container.add([circle, inner, letter]);
                    
                    // Name
                    const nameText = this.add.text(x, y + 70, mage.name.split(' ')[0], {
                        fontFamily: 'Courier New',
                        fontSize: '14px',
                        color: '#ffffff'
                    }).setOrigin(0.5);
                    
                    // Role
                    const roleText = this.add.text(x, y + 90, mage.role, {
                        fontFamily: 'Courier New',
                        fontSize: '10px',
                        color: '#aaaaaa'
                    }).setOrigin(0.5);
                    
                    // Make interactive
                    const hitArea = this.add.rectangle(x, y, 100, 120, 0x000000, 0);
                    hitArea.setInteractive();
                    
                    hitArea.on('pointerover', () => {
                        circle.setStrokeStyle(3, 0xffffff);
                    });
                    
                    hitArea.on('pointerout', () => {
                        circle.setStrokeStyle(0);
                    });
                    
                    hitArea.on('pointerdown', () => {
                        this.showMageDetails(mage);
                    });
                });
                
                // Back button
                const back = this.add.text(40, this.cameras.main.height - 40, '< BACK', {
                    fontFamily: 'Courier New',
                    fontSize: '20px',
                    color: '#00aaff'
                }).setInteractive();
                
                back.on('pointerdown', () => {
                    this.scene.start('MenuScene');
                });
            }

            showMageDetails(mage) {
                // Clear previous details
                if (this.detailsContainer) {
                    this.detailsContainer.destroy();
                }
                
                this.detailsContainer = this.add.container(this.cameras.main.centerX, 450);
                
                // Background panel
                const panel = this.add.rectangle(0, 0, 600, 280, 0x0a0a1a, 0.95)
                    .setStrokeStyle(2, mage.color);
                
                // Details text
                const details = [
                    `ROLE: ${mage.role}`,
                    '',
                    `PASSIVE: ${mage.passive.name}`,
                    mage.passive.description,
                    '',
                    'SKILLS:',
                    ...mage.skills.map(s => `• ${s.name}: ${s.description}`),
                    '',
                    `ULTIMATE: ${mage.ultimate.name}`,
                    mage.ultimate.description,
                    '',
                    `STRENGTHS: ${mage.strengths.join(', ')}`,
                    `WEAKNESSES: ${mage.weaknesses.join(', ')}`
                ];
                
                const text = this.add.text(-280, -120, details.join('\n'), {
                    fontFamily: 'Courier New',
                    fontSize: '12px',
                    color: '#ffffff',
                    lineSpacing: 4
                });
                
                // Select button
                const selectBtn = this.add.rectangle(0, 120, 200, 40, mage.color)
                    .setInteractive();
                
                const btnText = this.add.text(0, 120, 'SELECT MAGE', {
                    fontFamily: 'Courier New',
                    fontSize: '16px',
                    color: '#000000',
                    fontStyle: 'bold'
                }).setOrigin(0.5);
                
                selectBtn.on('pointerdown', () => {
                    this.scene.start('GameScene', { mode: 'duel', mageClass: mage.id });
                });
                
                this.detailsContainer.add([panel, text, selectBtn, btnText]);
            }

            createStarfield() {
                const graphics = this.add.graphics();
                for (let i = 0; i < 200; i++) {
                    const x = Phaser.Math.Between(0, this.cameras.main.width);
                    const y = Phaser.Math.Between(0, this.cameras.main.height);
                    const size = Phaser.Math.FloatBetween(0.5, 2);
                    graphics.fillStyle(0xffffff, Phaser.Math.FloatBetween(0.3, 1));
                    graphics.fillCircle(x, y, size);
                }
            }
        }

        // ==========================================
        // SCENE: MAIN GAME
        // ==========================================
        class GameScene extends Phaser.Scene {
            constructor() {
                super({ key: 'GameScene' });
            }

            init(data) {
                this.gameMode = data.mode || 'duel';
                this.selectedMage = MAGE_CLASSES[data.mageClass?.toUpperCase()] || MAGE_CLASSES.VOID;
                this.matchTime = CONSTANTS.MATCH_DURATION;
                this.score = 0;
                this.waveNumber = 1;
            }

            create() {
                // Setup world
                this.physics.world.setBounds(0, 0, CONSTANTS.WORLD_WIDTH, CONSTANTS.WORLD_HEIGHT);
                
                // Create arena
                this.createArena();
                
                // Create player
                this.createPlayer();
                
                // Create enemies based on mode
                this.createEnemies();
                
                // Setup camera
                this.cameras.main.setBounds(0, 0, CONSTANTS.WORLD_WIDTH, CONSTANTS.WORLD_HEIGHT);
                this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
                this.cameras.main.setZoom(0.8);
                
                // Create UI
                this.createUI();
                
                // Setup input
                this.setupControls();
                
                // Create groups
                this.projectiles = this.physics.add.group();
                this.effects = this.add.group();
                this.enemies = this.physics.add.group();
                this.constructs = this.physics.add.group();
                
                // Collisions
                this.setupCollisions();
                
                // Timers
                this.time.addEvent({
                    delay: 1000,
                    callback: this.updateMatchTimer,
                    callbackScope: this,
                    loop: true
                });
                
                // Wave timer for survival
                if (this.gameMode === 'survival') {
                    this.time.addEvent({
                        delay: CONSTANTS.WAVE_INTERVAL,
                        callback: this.spawnWave,
                        callbackScope: this,
                        loop: true
                    });
                }
                
                // Passive regeneration for Nano
                if (this.selectedMage.id === 'nano') {
                    this.time.addEvent({
                        delay: 500,
                        callback: () => {
                            if (this.player && this.player.active) {
                                this.healPlayer(this.player.maxHealth * 0.01);
                            }
                        },
                        callbackScope: this,
                        loop: true
                    });
                }
            }

            createArena() {
                // Floor
                const tileSize = 64;
                for (let x = 0; x < CONSTANTS.WORLD_WIDTH; x += tileSize) {
                    for (let y = 0; y < CONSTANTS.WORLD_HEIGHT; y += tileSize) {
                        this.add.image(x + tileSize/2, y + tileSize/2, 'floor_tile')
                            .setAlpha(0.5);
                    }
                }
                
                // Walls (create arena boundary)
                this.walls = this.physics.add.staticGroup();
                
                // Top and bottom walls
                for (let x = 0; x < CONSTANTS.WORLD_WIDTH; x += 64) {
                    this.walls.create(x + 32, 32, 'wall');
                    this.walls.create(x + 32, CONSTANTS.WORLD_HEIGHT - 32, 'wall');
                }
                
                // Left and right walls
                for (let y = 64; y < CONSTANTS.WORLD_HEIGHT - 64; y += 64) {
                    this.walls.create(32, y + 32, 'wall');
                    this.walls.create(CONSTANTS.WORLD_WIDTH - 32, y + 32, 'wall');
                }
                
                // Random obstacles based on mode
                const obstacleCount = this.gameMode === 'boss' ? 8 : 15;
                for (let i = 0; i < obstacleCount; i++) {
                    const x = Phaser.Math.Between(200, CONSTANTS.WORLD_WIDTH - 200);
                    const y = Phaser.Math.Between(200, CONSTANTS.WORLD_HEIGHT - 200);
                    this.walls.create(x, y, 'wall');
                }
                
                // Teleporters
                this.teleporters = this.physics.add.staticGroup();
                for (let i = 0; i < 4; i++) {
                    const x = Phaser.Math.Between(300, CONSTANTS.WORLD_WIDTH - 300);
                    const y = Phaser.Math.Between(300, CONSTANTS.WORLD_HEIGHT - 300);
                    const tele = this.teleporters.create(x, y, 'teleporter');
                    tele.setAlpha(0.7);
                    
                    // Pulse animation
                    this.tweens.add({
                        targets: tele,
                        scale: 1.2,
                        alpha: 0.4,
                        duration: 1000,
                        yoyo: true,
                        repeat: -1
                    });
                }
                
                // Hazards
                this.hazards = this.physics.add.staticGroup();
                for (let i = 0; i < 6; i++) {
                    const x = Phaser.Math.Between(400, CONSTANTS.WORLD_WIDTH - 400);
                    const y = Phaser.Math.Between(400, CONSTANTS.WORLD_HEIGHT - 400);
                    this.hazards.create(x, y, 'hazard');
                }
                
                // Visual effects - ambient particles
                this.createAmbientEffects();
            }

            createAmbientEffects() {
                // Floating energy particles
                for (let i = 0; i < 50; i++) {
                    const x = Phaser.Math.Between(0, CONSTANTS.WORLD_WIDTH);
                    const y = Phaser.Math.Between(0, CONSTANTS.WORLD_HEIGHT);
                    const particle = this.add.circle(x, y, 2, this.selectedMage.color, 0.5);
                    
                    this.tweens.add({
                        targets: particle,
                        y: y - 100,
                        alpha: 0,
                        duration: Phaser.Math.Between(3000, 6000),
                        repeat: -1,
                        delay: Phaser.Math.Between(0, 3000)
                    });
                }
            }

            createPlayer() {
                const startX = CONSTANTS.WORLD_WIDTH / 2;
                const startY = CONSTANTS.WORLD_HEIGHT / 2;
                
                this.player = this.physics.add.sprite(startX, startY, 'player_base');
                this.player.setCollideWorldBounds(true);
                this.player.setDrag(800);
                this.player.setCircle(30);
                
                // Player properties
                this.player.mageClass = this.selectedMage;
                this.player.maxHealth = this.selectedMage.health;
                this.player.health = this.selectedMage.health;
                this.player.energy = CONSTANTS.ENERGY_MAX;
                this.player.overload = 0;
                this.player.isStunned = false;
                this.player.isDead = false;
                this.player.speedMultiplier = 1;
                
                // Skill cooldowns
                this.player.cooldowns = {};
                this.selectedMage.skills.forEach(skill => {
                    this.player.cooldowns[skill.key] = 0;
                });
                this.player.cooldowns.ultimate = 0;
                
                // Visual - mage color tint
                this.player.setTint(this.selectedMage.color);
                
                // Aura effect
                this.player.aura = this.add.image(startX, startY, 'aura');
                this.player.aura.setTint(this.selectedMage.color);
                this.player.aura.setAlpha(0.3);
                
                // Position history for Chrono rewind
                this.player.positionHistory = [];
                this.time.addEvent({
                    delay: 100,
                    callback: () => {
                        if (this.player && this.player.active && !this.player.isDead) {
                            this.player.positionHistory.push({
                                x: this.player.x,
                                y: this.player.y,
                                health: this.player.health,
                                timestamp: this.time.now
                            });
                            if (this.player.positionHistory.length > 30) {
                                this.player.positionHistory.shift();
                            }
                        }
                    },
                    callbackScope: this,
                    loop: true
                });
            }

            createEnemies() {
                const enemyConfigs = {
                    'duel': [{ type: 'AGGRESSIVE', count: 1 }],
                    'arena': [
                        { type: 'AGGRESSIVE', count: 2 },
                        { type: 'TACTICAL', count: 2 },
                        { type: 'SUPPORT', count: 1 }
                    ],
                    'survival': [{ type: 'AGGRESSIVE', count: 3 }],
                    'boss': [{ type: 'BOSS', count: 1 }]
                };
                
                const config = enemyConfigs[this.gameMode] || enemyConfigs.duel;
                
                config.forEach(group => {
                    for (let i = 0; i < group.count; i++) {
                        this.spawnEnemy(group.type);
                    }
                });
            }

            spawnEnemy(type) {
                const enemyType = ENEMY_TYPES[type];
                const angle = Phaser.Math.FloatBetween(0, Math.PI * 2);
                const distance = Phaser.Math.Between(400, 600);
                const x = this.player.x + Math.cos(angle) * distance;
                const y = this.player.y + Math.sin(angle) * distance;
                
                const enemy = this.physics.add.sprite(x, y, `enemy_${enemyType.behavior}`);
                enemy.setCircle(30);
                enemy.enemyType = enemyType;
                enemy.behavior = enemyType.behavior;
                enemy.maxHealth = enemyType.health;
                enemy.health = enemyType.health;
                enemy.attackCooldown = 0;
                enemy.isStunned = false;
                enemy.isSilenced = false;
                
                // Boss specific
                if (type === 'BOSS') {
                    enemy.currentPhase = 0;
                    enemy.phaseTriggered = [false, false, false];
                }
                
                this.enemies.add(enemy);
                
                // AI update
                enemy.aiTimer = this.time.addEvent({
                    delay: 500,
                    callback: () => this.updateEnemyAI(enemy),
                    callbackScope: this,
                    loop: true
                });
            }

            spawnWave() {
                this.waveNumber++;
                const count = 2 + Math.floor(this.waveNumber / 2);
                
                for (let i = 0; i < count; i++) {
                    const types = ['AGGRESSIVE', 'TACTICAL', 'SUPPORT'];
                    const type = types[Phaser.Math.Between(0, types.length - 1)];
                    this.spawnEnemy(type);
                }
                
                // Wave announcement
                this.showFloatingText(
                    this.cameras.main.centerX,
                    this.cameras.main.centerY - 100,
                    `WAVE ${this.waveNumber}`,
                    0xff0044,
                    32
                );
            }

            setupControls() {
                // Virtual joystick - Movement
                this.moveJoystick = {
                    active: false,
                    pointer: null,
                    baseX: 100,
                    baseY: this.cameras.main.height - 150,
                    stickX: 100,
                    stickY: this.cameras.main.height - 150,
                    maxDistance: 50
                };
                
                // Virtual joystick - Aim
                this.aimJoystick = {
                    active: false,
                    pointer: null,
                    baseX: this.cameras.main.width - 100,
                    baseY: this.cameras.main.height - 150,
                    stickX: this.cameras.main.width - 100,
                    stickY: this.cameras.main.height - 150,
                    maxDistance: 60
                };
                
                // Create joystick visuals
                this.moveBase = this.add.image(this.moveJoystick.baseX, this.moveJoystick.baseY, 'joystick_base')
                    .setScrollFactor(0)
                    .setAlpha(0.5);
                this.moveStick = this.add.image(this.moveJoystick.stickX, this.moveJoystick.stickY, 'joystick_stick')
                    .setScrollFactor(0)
                    .setAlpha(0.7);
                
                this.aimBase = this.add.image(this.aimJoystick.baseX, this.aimJoystick.baseY, 'joystick_base')
                    .setScrollFactor(0)
                    .setAlpha(0.5);
                this.aimStick = this.add.image(this.aimJoystick.stickX, this.aimJoystick.stickY, 'joystick_stick')
                    .setScrollFactor(0)
                    .setAlpha(0.7);
                
                // Input handling
                this.input.on('pointerdown', (pointer) => {
                    if (pointer.x < this.cameras.main.width / 2) {
                        this.moveJoystick.active = true;
                        this.moveJoystick.pointer = pointer;
                        this.moveJoystick.baseX = pointer.x;
                        this.moveJoystick.baseY = pointer.y;
                        this.moveBase.setPosition(pointer.x, pointer.y);
                        this.moveStick.setPosition(pointer.x, pointer.y);
                    } else {
                        this.aimJoystick.active = true;
                        this.aimJoystick.pointer = pointer;
                        this.aimJoystick.baseX = pointer.x;
                        this.aimJoystick.baseY = pointer.y;
                        this.aimBase.setPosition(pointer.x, pointer.y);
                        this.aimStick.setPosition(pointer.x, pointer.y);
                    }
                });
                
                this.input.on('pointermove', (pointer) => {
                    if (this.moveJoystick.active && this.moveJoystick.pointer === pointer) {
                        const dx = pointer.x - this.moveJoystick.baseX;
                        const dy = pointer.y - this.moveJoystick.baseY;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        const angle = Math.atan2(dy, dx);
                        
                        const clampedDistance = Math.min(distance, this.moveJoystick.maxDistance);
                        this.moveJoystick.stickX = this.moveJoystick.baseX + Math.cos(angle) * clampedDistance;
                        this.moveJoystick.stickY = this.moveJoystick.baseY + Math.sin(angle) * clampedDistance;
                        this.moveStick.setPosition(this.moveJoystick.stickX, this.moveJoystick.stickY);
                    }
                    
                    if (this.aimJoystick.active && this.aimJoystick.pointer === pointer) {
                        const dx = pointer.x - this.aimJoystick.baseX;
                        const dy = pointer.y - this.aimJoystick.baseY;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        const angle = Math.atan2(dy, dx);
                        
                        const clampedDistance = Math.min(distance, this.aimJoystick.maxDistance);
                        this.aimJoystick.stickX = this.aimJoystick.baseX + Math.cos(angle) * clampedDistance;
                        this.aimJoystick.stickY = this.aimJoystick.baseY + Math.sin(angle) * clampedDistance;
                        this.aimStick.setPosition(this.aimJoystick.stickX, this.aimJoystick.stickY);
                    }
                });
                
                this.input.on('pointerup', (pointer) => {
                    if (this.moveJoystick.pointer === pointer) {
                        this.moveJoystick.active = false;
                        this.moveJoystick.pointer = null;
                        this.moveBase.setPosition(100, this.cameras.main.height - 150);
                        this.moveStick.setPosition(100, this.cameras.main.height - 150);
                    }
                    if (this.aimJoystick.pointer === pointer) {
                        this.aimJoystick.active = false;
                        this.aimJoystick.pointer = null;
                        this.aimBase.setPosition(this.cameras.main.width - 100, this.cameras.main.height - 150);
                        this.aimStick.setPosition(this.cameras.main.width - 100, this.cameras.main.height - 150);
                    }
                });
                
                // Skill buttons
                this.createSkillButtons();
            }

            createSkillButtons() {
                const buttonY = this.cameras.main.height - 80;
                const buttonSize = 60;
                const spacing = 70;
                const startX = this.cameras.main.width / 2 - spacing * 1.5;
                
                this.skillButtons = [];
                
                // Regular skills
                this.selectedMage.skills.forEach((skill, index) => {
                    const x = startX + index * spacing;
                    const btn = this.createSkillButton(x, buttonY, skill, index + 1);
                    this.skillButtons.push(btn);
                });
                
                // Ultimate button
                const ultX = startX + 3 * spacing + 20;
                const ultBtn = this.createSkillButton(ultX, buttonY, this.selectedMage.ultimate, 'ULT', true);
                this.skillButtons.push(ultBtn);
            }

            createSkillButton(x, y, skill, key, isUltimate = false) {
                const container = this.add.container(x, y);
                container.setScrollFactor(0);
                
                const size = isUltimate ? 70 : 60;
                const bg = this.add.rectangle(0, 0, size, size, 0x1a1a3a)
                    .setStrokeStyle(3, isUltimate ? 0xffd700 : this.selectedMage.color);
                
                const icon = this.add.image(0, 0, `skill_${this.selectedMage.id}`)
                    .setDisplaySize(size - 10, size - 10);
                
                // Cooldown overlay
                const cooldown = this.add.rectangle(0, 0, size, size, 0x000000, 0.7);
                cooldown.visible = false;
                
                // Key label
                const label = this.add.text(0, size/2 + 10, key.toString(), {
                    fontFamily: 'Courier New',
                    fontSize: '12px',
                    color: '#ffffff'
                }).setOrigin(0.5);
                
                container.add([bg, icon, cooldown, label]);
                container.setSize(size, size);
                container.setInteractive();
                
                container.on('pointerdown', () => {
                    this.activateSkill(skill, isUltimate);
                });
                
                container.cooldownOverlay = cooldown;
                container.skillData = skill;
                container.isUltimate = isUltimate;
                
                return container;
            }

            createUI() {
                // Health bar
                this.healthBar = {
                    bg: this.add.image(120, 40, 'bar_bg').setScrollFactor(0),
                    fill: this.add.image(120, 40, 'bar_health').setScrollFactor(0)
                };
                
                this.add.text(20, 35, 'HP', {
                    fontFamily: 'Courier New',
                    fontSize: '14px',
                    color: '#ffffff'
                }).setScrollFactor(0);
                
                // Energy bar
                this.energyBar = {
                    bg: this.add.image(120, 70, 'bar_bg').setScrollFactor(0),
                    fill: this.add.image(120, 70, 'bar_energy').setScrollFactor(0)
                };
                
                this.add.text(20, 65, 'NRG', {
                    fontFamily: 'Courier New',
                    fontSize: '14px',
                    color: '#ffffff'
                }).setScrollFactor(0);
                
                // Overload bar (overlay)
                this.overloadBar = this.add.image(120, 70, 'bar_overload')
                    .setScrollFactor(0)
                    .setAlpha(0);
                
                // Overload warning
                this.overloadWarning = this.add.text(this.cameras.main.centerX, 120, 'WARNING: OVERLOAD CRITICAL', {
                    fontFamily: 'Courier New',
                    fontSize: '20px',
                    color: '#ff0044',
                    fontStyle: 'bold'
                }).setOrigin(0.5).setScrollFactor(0).setVisible(false);
                
                // Timer
                this.timerText = this.add.text(this.cameras.main.centerX, 20, '05:00', {
                    fontFamily: 'Courier New',
                    fontSize: '24px',
                    color: '#00aaff'
                }).setOrigin(0.5).setScrollFactor(0);
                
                // Score/Kills
                this.scoreText = this.add.text(this.cameras.main.width - 20, 20, 'KILLS: 0', {
                    fontFamily: 'Courier New',
                    fontSize: '18px',
                    color: '#ffffff'
                }).setOrigin(1, 0).setScrollFactor(0);
                
                // Mage name
                this.add.text(20, 100, this.selectedMage.name, {
                    fontFamily: 'Courier New',
                    fontSize: '14px',
                    color: this.selectedMage.color
                }).setScrollFactor(0);
                
                // FPS counter
                this.fpsText = this.add.text(20, this.cameras.main.height - 20, 'FPS: 60', {
                    fontFamily: 'Courier New',
                    fontSize: '12px',
                    color: '#666666'
                }).setScrollFactor(0);
            }

            setupCollisions() {
                // Player vs Walls
                this.physics.add.collider(this.player, this.walls);
                
                // Enemies vs Walls
                this.physics.add.collider(this.enemies, this.walls);
                
                // Projectiles vs Walls
                this.physics.add.collider(this.projectiles, this.walls, (proj) => {
                    this.createImpactEffect(proj.x, proj.y, proj.texture.key);
                    proj.destroy();
                });
                
                // Projectiles vs Enemies
                this.physics.add.overlap(this.projectiles, this.enemies, (proj, enemy) => {
                    if (proj.owner === 'player') {
                        this.damageEnemy(enemy, proj.damage);
                        this.createImpactEffect(enemy.x, enemy.y, proj.texture.key);
                        proj.destroy();
                    }
                });
                
                // Enemy projectiles vs Player
                this.physics.add.overlap(this.projectiles, this.player, (proj, player) => {
                    if (proj.owner === 'enemy' && !player.isStunned) {
                        this.damagePlayer(proj.damage);
                        this.createImpactEffect(player.x, player.y, proj.texture.key);
                        proj.destroy();
                    }
                });
                
                // Player vs Teleporters
                this.physics.add.overlap(this.player, this.teleporters, (player, tele) => {
                    // Find another teleporter
                    const others = this.teleporters.getChildren().filter(t => t !== tele);
                    if (others.length > 0 && !player.teleportCooldown) {
                        const target = Phaser.Utils.Array.GetRandom(others);
                        player.setPosition(target.x, target.y);
                        player.teleportCooldown = true;
                        
                        this.time.delayedCall(3000, () => {
                            if (player.active) player.teleportCooldown = false;
                        });
                        
                        // Teleport effect
                        this.createTeleportEffect(player.x, player.y);
                    }
                });
                
                // Player vs Hazards
                this.physics.add.overlap(this.player, this.hazards, (player) => {
                    if (!player.hazardDamageCooldown) {
                        this.damagePlayer(10);
                        player.hazardDamageCooldown = true;
                        this.time.delayedCall(1000, () => {
                            if (player.active) player.hazardDamageCooldown = false;
                        });
                    }
                });
            }

            update(time, delta) {
                if (this.player.isDead) return;
                
                // Update FPS
                this.fpsText.setText(`FPS: ${Math.round(this.game.loop.actualFps)}`);
                
                // Player movement
                this.updatePlayerMovement();
                
                // Update player rotation (aiming)
                this.updatePlayerAim();
                
                // Update aura position
                this.player.aura.setPosition(this.player.x, this.player.y);
                
                // Energy regeneration
                this.regenerateEnergy(delta);
                
                // Update cooldowns
                this.updateCooldowns(delta);
                
                // Update UI
                this.updateUI();
                
                // Check overload
                this.checkOverload();
                
                // Update effects
                this.updateEffects();
                
                // Check win/lose conditions
                this.checkGameState();
            }

            updatePlayerMovement() {
                if (this.player.isStunned) {
                    this.player.setVelocity(0);
                    return;
                }
                
                let vx = 0;
                let vy = 0;
                
                if (this.moveJoystick.active) {
                    const dx = this.moveJoystick.stickX - this.moveJoystick.baseX;
                    const dy = this.moveJoystick.stickY - this.moveJoystick.baseY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance > 10) {
                        const normalizedX = dx / distance;
                        const normalizedY = dy / distance;
                        const speed = CONSTANTS.PLAYER_SPEED * this.player.speedMultiplier * (distance / this.moveJoystick.maxDistance);
                        
                        vx = normalizedX * speed;
                        vy = normalizedY * speed;
                    }
                }
                
                this.player.setVelocity(vx, vy);
                
                // Passive: Static Charge for Cyber Lightning
                if (this.selectedMage.id === 'cyber_lightning' && (vx !== 0 || vy !== 0)) {
                    if (!this.player.staticCharge) this.player.staticCharge = 0;
                    this.player.staticCharge = Math.min(this.player.staticCharge + 0.1, 100);
                }
            }

            updatePlayerAim() {
                if (this.aimJoystick.active) {
                    const dx = this.aimJoystick.stickX - this.aimJoystick.baseX;
                    const dy = this.aimJoystick.stickY - this.aimJoystick.baseY;
                    
                    if (Math.sqrt(dx * dx + dy * dy) > 10) {
                        const angle = Math.atan2(dy, dx);
                        this.player.setRotation(angle);
                    }
                }
            }

            regenerateEnergy(delta) {
                const regen = (this.selectedMage.energyRegen * delta) / 1000;
                this.player.energy = Math.min(this.player.energy + regen, CONSTANTS.ENERGY_MAX);
                
                // Passive: Temporal Flow for Chrono
                if (this.selectedMage.id === 'chrono') {
                    // Already handled in cooldown reduction
                }
            }

            updateCooldowns(delta) {
                const timeScale = this.selectedMage.id === 'chrono' ? 1.2 : 1;
                
                Object.keys(this.player.cooldowns).forEach(key => {
                    if (this.player.cooldowns[key] > 0) {
                        this.player.cooldowns[key] -= delta * timeScale;
                        if (this.player.cooldowns[key] < 0) this.player.cooldowns[key] = 0;
                    }
                });
                
                // Update button visuals
                this.skillButtons.forEach(btn => {
                    const skill = btn.skillData;
                    const key = btn.isUltimate ? 'ultimate' : skill.key;
                    const remaining = this.player.cooldowns[key];
                    const maxCooldown = btn.isUltimate ? skill.cooldown : skill.cooldown;
                    
                    if (remaining > 0) {
                        btn.cooldownOverlay.visible = true;
                        const scale = remaining / maxCooldown;
                        btn.cooldownOverlay.setScale(1, scale);
                        btn.cooldownOverlay.y = (1 - scale) * -30;
                    } else {
                        btn.cooldownOverlay.visible = false;
                    }
                });
            }

            updateUI() {
                // Health bar
                const healthPercent = this.player.health / this.player.maxHealth;
                this.healthBar.fill.setScale(healthPercent, 1);
                this.healthBar.fill.setTint(healthPercent > 0.5 ? 0x00ff44 : 0xff0044);
                
                // Energy bar
                const energyPercent = this.player.energy / CONSTANTS.ENERGY_MAX;
                this.energyBar.fill.setScale(energyPercent, 1);
                
                // Overload bar overlay
                const overloadPercent = this.player.overload / CONSTANTS.OVERLOAD_MAX;
                this.overloadBar.setAlpha(overloadPercent > 0 ? 0.7 : 0);
                this.overloadBar.setScale(Math.min(overloadPercent, 1), 1);
                
                // Warning
                this.overloadWarning.setVisible(this.player.overload > CONSTANTS.OVERLOAD_THRESHOLD);
                
                // Score
                this.scoreText.setText(`KILLS: ${this.score}`);
            }

            checkOverload() {
                if (this.player.overload >= CONSTANTS.OVERLOAD_MAX && !this.player.overloadStunned) {
                    // Overload stun
                    this.player.overloadStunned = true;
                    this.player.isStunned = true;
                    this.player.overload = CONSTANTS.OVERLOAD_MAX * 0.5; // Reset to 50%
                    
                    // Self damage
                    this.damagePlayer(15);
                    
                    // Visual feedback
                    this.cameras.main.shake(500, 0.02);
                    this.showFloatingText(this.player.x, this.player.y - 50, 'OVERLOAD!', 0xff0044, 24);
                    
                    // Stun duration
                    this.time.delayedCall(CONSTANTS.STUN_DURATION, () => {
                        if (this.player.active) {
                            this.player.isStunned = false;
                            this.player.overloadStunned = false;
                        }
                    });
                }
            }

            activateSkill(skill, isUltimate) {
                if (this.player.isDead || this.player.isStunned) return;
                
                const key = isUltimate ? 'ultimate' : skill.key;
                
                // Check cooldown
                if (this.player.cooldowns[key] > 0) return;
                
                // Check energy
                if (this.player.energy < skill.energyCost) {
                    this.showFloatingText(this.player.x, this.player.y - 30, 'NO ENERGY!', 0xffaa00, 16);
                    return;
                }
                
                // Check silence (EMP)
                if (this.player.isSilenced && !isUltimate) {
                    this.showFloatingText(this.player.x, this.player.y - 30, 'SILENCED!', 0xff0044, 16);
                    return;
                }
                
                // Consume energy
                this.player.energy -= skill.energyCost;
                
                // Add overload
                const overloadGain = isUltimate ? 30 : 15;
                this.player.overload = Math.min(this.player.overload + overloadGain, CONSTANTS.OVERLOAD_MAX);
                
                // Set cooldown
                this.player.cooldowns[key] = skill.cooldown;
                
                // Execute skill
                this.executeSkill(skill, isUltimate);
            }

            executeSkill(skill, isUltimate) {
                const angle = this.player.rotation;
                const vx = Math.cos(angle);
                const vy = Math.sin(angle);
                
                // Damage boost from overload
                const damageMult = this.player.overload > CONSTANTS.OVERLOAD_THRESHOLD ? 
                    CONSTANTS.DAMAGE_BOOST_AT_OVERLOAD : 1;
                
                // Passive: Static Charge damage boost
                if (this.selectedMage.id === 'cyber_lightning' && this.player.staticCharge >= 100) {
                    damageMult *= 1.25;
                    this.player.staticCharge = 0;
                    this.showFloatingText(this.player.x, this.player.y - 60, 'MAX CHARGE!', 0x00ffff, 16);
                }
                
                switch(this.selectedMage.id) {
                    case 'void':
                        this.executeVoidSkill(skill, vx, vy, damageMult, isUltimate);
                        break;
                    case 'tech_flame':
                        this.executeFlameSkill(skill, vx, vy, damageMult, isUltimate);
                        break;
                    case 'cyber_lightning':
                        this.executeLightningSkill(skill, vx, vy, damageMult, isUltimate);
                        break;
                    case 'chrono':
                        this.executeChronoSkill(skill, vx, vy, damageMult, isUltimate);
                        break;
                    case 'nano':
                        this.executeNanoSkill(skill, vx, vy, damageMult, isUltimate);
                        break;
                }
                
                // Visual feedback
                this.createSkillCastEffect();
            }

            executeVoidSkill(skill, vx, vy, damageMult, isUltimate) {
                if (isUltimate) {
                    // Space Collapse - Area implosion
                    this.createGravityWell(this.player.x, this.player.y, 300, 3000, true);
                    this.cameras.main.shake(800, 0.03);
                    
                    // Stun all enemies
                    this.enemies.getChildren().forEach(enemy => {
                        const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, enemy.x, enemy.y);
                        if (dist < 300) {
                            this.stunEnemy(enemy, 2000);
                            this.damageEnemy(enemy, skill.damage * damageMult);
                        }
                    });
                } else if (skill.name === 'Gravity Well') {
                    const targetX = this.player.x + vx * 200;
                    const targetY = this.player.y + vy * 200;
                    this.createGravityWell(targetX, targetY, 150, skill.duration, false);
                } else if (skill.name === 'Singularity') {
                    this.fireProjectile('proj_void', vx, vy, 300, skill.damage * damageMult, 2000, true);
                } else if (skill.name === 'Void Shield') {
                    this.createVoidShield();
                }
            }

            executeFlameSkill(skill, vx, vy, damageMult, isUltimate) {
                if (isUltimate) {
                    // Solar Detonation
                    this.createExplosion(this.player.x, this.player.y, 250, skill.damage * damageMult, 0xff4400);
                    this.cameras.main.shake(500, 0.04);
                } else if (skill.name === 'Plasma Stream') {
                    this.createBeam(vx, vy, skill.damage * damageMult, 0xff4400, skill.duration);
                } else if (skill.name === 'Heat Wave') {
                    this.createRadialBurst(skill.damage * damageMult, 0xff4400);
                } else if (skill.name === 'Inferno Dash') {
                    this.player.setVelocity(vx * CONSTANTS.DASH_SPEED, vy * CONSTANTS.DASH_SPEED);
                    this.createFireTrail();
                }
            }

            executeLightningSkill(skill, vx, vy, damageMult, isUltimate) {
                if (isUltimate) {
                    // EMP Storm
                    this.createEMPStorm(skill.duration, skill.radius);
                    this.enemies.getChildren().forEach(enemy => {
                        const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, enemy.x, enemy.y);
                        if (dist < skill.radius) {
                            this.silenceEnemy(enemy, skill.disableDuration);
                            this.damageEnemy(enemy, skill.damage * damageMult);
                        }
                    });
                } else if (skill.name === 'Chain Lightning') {
                    this.fireChainLightning(skill.damage * damageMult, skill.bounces);
                } else if (skill.name === 'Flash Step') {
                    const targetX = this.player.x + vx * skill.range;
                    const targetY = this.player.y + vy * skill.range;
                    this.createTeleportEffect(this.player.x, this.player.y);
                    this.player.setPosition(targetX, targetY);
                    this.createTeleportEffect(targetX, targetY);
                    
                    // Damage at departure and arrival
                    this.createRadialBurst(20, 0x00ffff, 100);
                } else if (skill.name === 'Thunder Strike') {
                    const targetX = this.player.x + vx * 300;
                    const targetY = this.player.y + vy * 300;
                    this.createDelayedStrike(targetX, targetY, skill.damage * damageMult, skill.delay);
                }
            }

            executeChronoSkill(skill, vx, vy, damageMult, isUltimate) {
                if (isUltimate) {
                    // Time Freeze
                    this.createTimeFreeze(skill.duration, skill.radius);
                    this.enemies.getChildren().forEach(enemy => {
                        const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, enemy.x, enemy.y);
                        if (dist < skill.radius) {
                            this.stunEnemy(enemy, skill.duration);
                            this.createClockEffect(enemy.x, enemy.y);
                        }
                    });
                } else if (skill.name === 'Time Rift') {
                    const targetX = this.player.x + vx * 250;
                    const targetY = this.player.y + vy * 250;
                    this.createTimeRift(targetX, targetY, skill.duration, skill.slowAmount);
                } else if (skill.name === 'Rewind') {
                    // Find position 3 seconds ago
                    const history = this.player.positionHistory;
                    if (history.length > 0) {
                        const oldPos = history[0];
                        this.createRewindEffect();
                        this.player.setPosition(oldPos.x, oldPos.y);
                        this.healPlayer(this.player.maxHealth * skill.healPercent);
                    }
                } else if (skill.name === 'Accelerate') {
                    this.player.speedMultiplier = skill.speedBoost;
                    this.createHasteEffect();
                    this.time.delayedCall(skill.duration, () => {
                        if (this.player.active) this.player.speedMultiplier = 1;
                    });
                }
            }

            executeNanoSkill(skill, vx, vy, damageMult, isUltimate) {
                if (isUltimate) {
                    // Regeneration Dome
                    this.createRegenDome(skill.duration, skill.radius, skill.healPerSecond);
                } else if (skill.name === 'Repair Swarm') {
                    // Heal self or find ally
                    this.healPlayer(skill.heal);
                    this.createHealEffect(this.player.x, this.player.y);
                } else if (skill.name === 'Construct') {
                    this.summonConstruct(skill.duration, skill.health);
                } else if (skill.name === 'Nano Shield') {
                    this.createNanoShield(skill.duration, skill.damageReduction);
                }
            }

            // Skill effect creators
            createGravityWell(x, y, radius, duration, isUltimate) {
                const well = this.add.circle(x, y, radius, 0x9d00ff, 0.3);
                well.setStrokeStyle(2, 0x9d00ff);
                
                // Pull effect
                const pullTimer = this.time.addEvent({
                    delay: 100,
                    callback: () => {
                        if (!well.active) return;
                        this.enemies.getChildren().forEach(enemy => {
                            const dist = Phaser.Math.Distance.Between(x, y, enemy.x, enemy.y);
                            if (dist < radius && !enemy.isStunned) {
                                const angle = Phaser.Math.Angle.Between(enemy.x, enemy.y, x, y);
                                const force = isUltimate ? 150 : 80;
                                enemy.body.velocity.x += Math.cos(angle) * force * 0.1;
                                enemy.body.velocity.y += Math.sin(angle) * force * 0.1;
                            }
                        });
                    },
                    callbackScope: this,
                    loop: true
                });
                
                // Spin animation
                this.tweens.add({
                    targets: well,
                    rotation: Math.PI * 2,
                    duration: 3000,
                    repeat: -1
                });
                
                this.time.delayedCall(duration, () => {
                    well.destroy();
                    pullTimer.remove();
                    
                    if (isUltimate) {
                        // Implosion damage
                        this.createExplosion(x, y, radius, 50, 0x9d00ff);
                    }
                });
                
                this.effects.add(well);
            }

            createBeam(vx, vy, damage, color, duration) {
                const beamLength = 400;
                const beam = this.add.rectangle(
                    this.player.x + vx * beamLength/2,
                    this.player.y + vy * beamLength/2,
                    beamLength, 20, color, 0.7
                );
                beam.setRotation(Math.atan2(vy, vx));
                
                // Damage over time
                const damageTimer = this.time.addEvent({
                    delay: 200,
                    callback: () => {
                        if (!beam.active) return;
                        const beamEndX = this.player.x + vx * beamLength;
                        const beamEndY = this.player.y + vy * beamLength;
                        
                        this.enemies.getChildren().forEach(enemy => {
                            const dist = Phaser.Math.Distance.Between(
                                this.player.x, this.player.y, enemy.x, enemy.y
                            );
                            const angle = Phaser.Math.Angle.Between(
                                this.player.x, this.player.y, enemy.x, enemy.y
                            );
                            const angleDiff = Math.abs(angle - Math.atan2(vy, vx));
                            
                            if (dist < beamLength && angleDiff < 0.2) {
                                this.damageEnemy(enemy, damage * 0.3);
                            }
                        });
                    },
                    callbackScope: this,
                    loop: true
                });
                
                this.time.delayedCall(duration, () => {
                    beam.destroy();
                    damageTimer.remove();
                });
                
                this.effects.add(beam);
            }

            createRadialBurst(damage, color, radius = 150) {
                const burst = this.add.circle(this.player.x, this.player.y, 10, color, 0.6);
                
                this.tweens.add({
                    targets: burst,
                    radius: radius,
                    alpha: 0,
                    duration: 300,
                    onUpdate: () => {
                        this.enemies.getChildren().forEach(enemy => {
                            const dist = Phaser.Math.Distance.Between(
                                this.player.x, this.player.y, enemy.x, enemy.y
                            );
                            if (dist < burst.radius && !enemy.hitByBurst) {
                                enemy.hitByBurst = true;
                                this.damageEnemy(enemy, damage);
                                this.time.delayedCall(300, () => {
                                    if (enemy.active) enemy.hitByBurst = false;
                                });
                            }
                        });
                    },
                    onComplete: () => burst.destroy()
                });
            }

            createFireTrail() {
                const trail = this.time.addEvent({
                    delay: 100,
                    callback: () => {
                        if (!this.player.active) {
                            trail.remove();
                            return;
                        }
                        const fire = this.add.circle(this.player.x, this.player.y, 30, 0xff4400, 0.5);
                        this.tweens.add({
                            targets: fire,
                            alpha: 0,
                            scale: 0,
                            duration: 1000,
                            onComplete: () => fire.destroy()
                        });
                        
                        // Damage enemies on trail
                        this.enemies.getChildren().forEach(enemy => {
                            const dist = Phaser.Math.Distance.Between(
                                this.player.x, this.player.y, enemy.x, enemy.y
                            );
                            if (dist < 40) {
                                this.damageEnemy(enemy, 10);
                            }
                        });
                    },
                    callbackScope: this,
                    loop: true,
                    repeat: 10
                });
            }

            fireProjectile(texture, vx, vy, speed, damage, duration, homing = false) {
                const proj = this.physics.add.sprite(
                    this.player.x + vx * 40,
                    this.player.y + vy * 40,
                    texture
                );
                proj.setVelocity(vx * speed, vy * speed);
                proj.damage = damage;
                proj.owner = 'player';
                proj.homing = homing;
                
                if (homing) {
                    // Find nearest enemy
                    let nearest = null;
                    let minDist = Infinity;
                    this.enemies.getChildren().forEach(enemy => {
                        const dist = Phaser.Math.Distance.Between(
                            this.player.x, this.player.y, enemy.x, enemy.y
                        );
                        if (dist < minDist) {
                            minDist = dist;
                            nearest = enemy;
                        }
                    });
                    proj.target = nearest;
                }
                
                this.projectiles.add(proj);
                
                // Homing update
                if (homing && proj.target) {
                    const homingTimer = this.time.addEvent({
                        delay: 50,
                        callback: () => {
                            if (!proj.active || !proj.target || !proj.target.active) {
                                homingTimer.remove();
                                return;
                            }
                            const angle = Phaser.Math.Angle.Between(
                                proj.x, proj.y, proj.target.x, proj.target.y
                            );
                            proj.body.velocity.x = Math.cos(angle) * speed;
                            proj.body.velocity.y = Math.sin(angle) * speed;
                            proj.setRotation(angle);
                        },
                        callbackScope: this,
                        loop: true
                    });
                }
                
                this.time.delayedCall(duration, () => {
                    if (proj.active) proj.destroy();
                });
            }

            fireChainLightning(damage, maxBounces) {
                const enemies = this.enemies.getChildren();
                if (enemies.length === 0) return;
                
                // Find nearest enemy
                let current = enemies.reduce((nearest, enemy) => {
                    const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, enemy.x, enemy.y);
                    return dist < nearest.dist ? { enemy, dist } : nearest;
                }, { enemy: null, dist: Infinity }).enemy;
                
                if (!current) return;
                
                let bounces = 0;
                let lastPos = { x: this.player.x, y: this.player.y };
                const hitEnemies = new Set();
                
                while (current && bounces < maxBounces) {
                    if (hitEnemies.has(current)) break;
                    
                    hitEnemies.add(current);
                    this.damageEnemy(current, damage);
                    
                    // Visual lightning
                    this.createLightningBolt(lastPos.x, lastPos.y, current.x, current.y);
                    
                    // Find next target
                    lastPos = { x: current.x, y: current.y };
                    const next = enemies.find(e => !hitEnemies.has(e) && 
                        Phaser.Math.Distance.Between(current.x, current.y, e.x, e.y) < 300);
                    
                    current = next;
                    bounces++;
                }
            }

            createLightningBolt(x1, y1, x2, y2) {
                const graphics = this.add.graphics();
                graphics.lineStyle(3, 0x00ffff, 1);
                
                const segments = 5;
                let currentX = x1;
                let currentY = y1;
                
                graphics.beginPath();
                graphics.moveTo(x1, y1);
                
                for (let i = 1; i < segments; i++) {
                    const t = i / segments;
                    const targetX = x1 + (x2 - x1) * t;
                    const targetY = y1 + (y2 - y1) * t;
                    const offset = (Math.random() - 0.5) * 30;
                    currentX = targetX + offset;
                    currentY = targetY + offset;
                    graphics.lineTo(currentX, currentY);
                }
                
                graphics.lineTo(x2, y2);
                graphics.strokePath();
                
                this.tweens.add({
                    targets: graphics,
                    alpha: 0,
                    duration: 200,
                    onComplete: () => graphics.destroy()
                });
            }

            createDelayedStrike(x, y, damage, delay) {
                const marker = this.add.circle(x, y, 40, 0x00ffff, 0.3);
                marker.setStrokeStyle(2, 0x00ffff);
                
                // Countdown
                const text = this.add.text(x, y, '2', {
                    fontFamily: 'Courier New',
                    fontSize: '24px',
                    color: '#ffffff'
                }).setOrigin(0.5);
                
                let count = 2;
                const countdown = this.time.addEvent({
                    delay: 1000,
                    callback: () => {
                        count--;
                        if (count > 0) text.setText(count.toString());
                        else text.destroy();
                    },
                    callbackScope: this,
                    repeat: 1
                });
                
                this.time.delayedCall(delay, () => {
                    marker.destroy();
                    this.createExplosion(x, y, 80, damage, 0x00ffff);
                    
                    // Damage enemies in area
                    this.enemies.getChildren().forEach(enemy => {
                        const dist = Phaser.Math.Distance.Between(x, y, enemy.x, enemy.y);
                        if (dist < 80) {
                            this.damageEnemy(enemy, damage);
                        }
                    });
                });
            }

            createTimeRift(x, y, duration, slowAmount) {
