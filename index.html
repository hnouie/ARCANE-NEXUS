                const rift = this.add.ellipse(x, y, 200, 200, 0xffd700, 0.2);
                rift.setStrokeStyle(3, 0xffd700);
                
                // Clock hands
                const hand1 = this.add.rectangle(x, y, 4, 60, 0xffd700);
                const hand2 = this.add.rectangle(x, y, 4, 40, 0xffd700);
                
                this.tweens.add({
                    targets: [hand1, hand2],
                    rotation: Math.PI * 2,
                    duration: 2000,
                    repeat: -1
                });
                
                // Slow effect
                const slowTimer = this.time.addEvent({
                    delay: 100,
                    callback: () => {
                        if (!rift.active) return;
                        this.enemies.getChildren().forEach(enemy => {
                            const dist = Phaser.Math.Distance.Between(x, y, enemy.x, enemy.y);
                            if (dist < 100) {
                                enemy.speedMultiplier = slowAmount;
                                enemy.setTint(0xffd700);
                            } else if (enemy.speedMultiplier === slowAmount) {
                                enemy.speedMultiplier = 1;
                                enemy.clearTint();
                            }
                        });
                    },
                    callbackScope: this,
                    loop: true
                });
                
                this.time.delayedCall(duration, () => {
                    rift.destroy();
                    hand1.destroy();
                    hand2.destroy();
                    slowTimer.remove();
                    
                    // Reset speeds
                    this.enemies.getChildren().forEach(enemy => {
                        if (enemy.active) {
                            enemy.speedMultiplier = 1;
                            enemy.clearTint();
                        }
                    });
                });
            }

            createRewindEffect() {
                // Ghost images
                this.player.positionHistory.forEach((pos, i) => {
                    if (i % 3 === 0) {
                        const ghost = this.add.circle(pos.x, pos.y, 30, 0xffd700, 0.3);
                        this.tweens.add({
                            targets: ghost,
                            alpha: 0,
                            scale: 0,
                            duration: 500,
                            delay: i * 50,
                            onComplete: () => ghost.destroy()
                        });
                    }
                });
            }

            createHasteEffect() {
                const trail = this.time.addEvent({
                    delay: 50,
                    callback: () => {
                        if (!this.player.active || this.player.speedMultiplier === 1) {
                            trail.remove();
                            return;
                        }
                        const ghost = this.add.image(this.player.x, this.player.y, 'player_base')
                            .setTint(0xffd700)
                            .setAlpha(0.3)
                            .setScale(0.9);
                        this.tweens.add({
                            targets: ghost,
                            alpha: 0,
                            duration: 300,
                            onComplete: () => ghost.destroy()
                        });
                    },
                    callbackScope: this,
                    loop: true
                });
            }

            summonConstruct(duration, health) {
                const construct = this.physics.add.sprite(
                    this.player.x + Phaser.Math.Between(-50, 50),
                    this.player.y + Phaser.Math.Between(-50, 50),
                    'enemy_support'
                );
                construct.setTint(0x00ff88);
                construct.health = health;
                construct.maxHealth = health;
                construct.isConstruct = true;
                construct.attackCooldown = 0;
                
                this.constructs.add(construct);
                
                // AI for construct
                const aiTimer = this.time.addEvent({
                    delay: 500,
                    callback: () => {
                        if (!construct.active) {
                            aiTimer.remove();
                            return;
                        }
                        
                        // Find nearest enemy
                        let nearest = null;
                        let minDist = Infinity;
                        this.enemies.getChildren().forEach(enemy => {
                            const dist = Phaser.Math.Distance.Between(construct.x, construct.y, enemy.x, enemy.y);
                            if (dist < minDist) {
                                minDist = dist;
                                nearest = enemy;
                            }
                        });
                        
                        if (nearest && minDist < 300) {
                            const angle = Phaser.Math.Angle.Between(construct.x, construct.y, nearest.x, nearest.y);
                            construct.setRotation(angle);
                            
                            if (minDist > 100) {
                                construct.setVelocity(Math.cos(angle) * 150, Math.sin(angle) * 150);
                            } else {
                                construct.setVelocity(0);
                                if (construct.attackCooldown <= 0) {
                                    this.fireEnemyProjectile(construct, nearest, 15);
                                    construct.attackCooldown = 1000;
                                }
                            }
                        } else {
                            // Follow player
                            const angle = Phaser.Math.Angle.Between(construct.x, construct.y, this.player.x, this.player.y);
                            if (minDist > 100) {
                                construct.setVelocity(Math.cos(angle) * 120, Math.sin(angle) * 120);
                            } else {
                                construct.setVelocity(0);
                            }
                        }
                        
                        construct.attackCooldown -= 500;
                    },
                    callbackScope: this,
                    loop: true
                });
                
                this.time.delayedCall(duration, () => {
                    if (construct.active) {
                        this.createExplosion(construct.x, construct.y, 50, 0, 0x00ff88);
                        construct.destroy();
                    }
                });
            }

            createRegenDome(duration, radius, healPerSecond) {
                const dome = this.add.circle(this.player.x, this.player.y, radius, 0x00ff88, 0.2);
                dome.setStrokeStyle(3, 0x00ff88);
                
                const healTimer = this.time.addEvent({
                    delay: 500,
                    callback: () => {
                        if (!dome.active) return;
                        
                        // Heal player
                        this.healPlayer(healPerSecond / 2);
                        
                        // Visual
                        const pulse = this.add.circle(this.player.x, this.player.y, 20, 0x00ff88, 0.5);
                        this.tweens.add({
                            targets: pulse,
                            scale: 3,
                            alpha: 0,
                            duration: 1000,
                            onComplete: () => pulse.destroy()
                        });
                    },
                    callbackScope: this,
                    loop: true
                });
                
                this.time.delayedCall(duration, () => {
                    dome.destroy();
                    healTimer.remove();
                });
            }

            createVoidShield() {
                const shield = this.add.circle(this.player.x, this.player.y, 60, 0x9d00ff, 0.3);
                shield.setStrokeStyle(4, 0x9d00ff);
                
                let absorbed = 0;
                
                // Absorb projectiles
                const absorbTimer = this.time.addEvent({
                    delay: 50,
                    callback: () => {
                        if (!shield.active || !this.player.active) {
                            absorbTimer.remove();
                            return;
                        }
                        
                        shield.setPosition(this.player.x, this.player.y);
                        
                        this.projectiles.getChildren().forEach(proj => {
                            if (proj.owner === 'enemy') {
                                const dist = Phaser.Math.Distance.Between(
                                    this.player.x, this.player.y, proj.x, proj.y
                                );
                                if (dist < 60) {
                                    proj.destroy();
                                    absorbed++;
                                    this.player.energy = Math.min(
                                        this.player.energy + 5,
                                        CONSTANTS.ENERGY_MAX
                                    );
                                    
                                    // Visual
                                    const absorb = this.add.circle(proj.x, proj.y, 10, 0x9d00ff, 0.8);
                                    this.tweens.add({
                                        targets: absorb,
                                        x: this.player.x,
                                        y: this.player.y,
                                        duration: 200,
                                        onComplete: () => absorb.destroy()
                                    });
                                }
                            }
                        });
                    },
                    callbackScope: this,
                    loop: true
                });
                
                this.time.delayedCall(2500, () => {
                    shield.destroy();
                    absorbTimer.remove();
                });
            }

            createNanoShield(duration, reduction) {
                this.player.damageReduction = reduction;
                const shield = this.add.circle(this.player.x, this.player.y, 50, 0x00ff88, 0.3);
                
                const updateTimer = this.time.addEvent({
                    delay: 50,
                    callback: () => {
                        if (!shield.active || !this.player.active) {
                            updateTimer.remove();
                            return;
                        }
                        shield.setPosition(this.player.x, this.player.y);
                    },
                    callbackScope: this,
                    loop: true
                });
                
                this.time.delayedCall(duration, () => {
                    shield.destroy();
                    updateTimer.remove();
                    this.player.damageReduction = 0;
                });
            }

            createEMPStorm(duration, radius) {
                const storm = this.add.circle(this.player.x, this.player.y, radius, 0x00ffff, 0.2);
                storm.setStrokeStyle(4, 0x00ffff);
                
                // Lightning effects
                const lightningTimer = this.time.addEvent({
                    delay: 200,
                    callback: () => {
                        if (!storm.active) return;
                        
                        const angle = Math.random() * Math.PI * 2;
                        const dist = Math.random() * radius;
                        const x = this.player.x + Math.cos(angle) * dist;
                        const y = this.player.y + Math.sin(angle) * dist;
                        
                        const bolt = this.add.rectangle(x, y, 4, 40, 0x00ffff);
                        bolt.setRotation(Math.random() * Math.PI);
                        this.tweens.add({
                            targets: bolt,
                            alpha: 0,
                            duration: 200,
                            onComplete: () => bolt.destroy()
                        });
                    },
                    callbackScope: this,
                    loop: true
                });
                
                this.time.delayedCall(duration, () => {
                    storm.destroy();
                    lightningTimer.remove();
                });
            }

            createTimeFreeze(duration, radius) {
                const freeze = this.add.circle(this.player.x, this.player.y, radius, 0xffffff, 0.4);
                
                this.tweens.add({
                    targets: freeze,
                    alpha: 0,
                    scale: 1.5,
                    duration: duration,
                    onComplete: () => freeze.destroy()
                });
            }

            // Enemy AI
            updateEnemyAI(enemy) {
                if (!enemy.active || enemy.isStunned || !this.player.active) return;
                
                const distToPlayer = Phaser.Math.Distance.Between(
                    enemy.x, enemy.y, this.player.x, this.player.y
                );
                
                // Boss phase check
                if (enemy.behavior === 'boss') {
                    const healthPercent = enemy.health / enemy.maxHealth;
                    enemy.enemyType.phases.forEach((phase, idx) => {
                        if (healthPercent < phase.healthThreshold && !enemy.phaseTriggered[idx]) {
                            enemy.phaseTriggered[idx] = true;
                            this.enterBossPhase(enemy, idx);
                        }
                    });
                }
                
                switch(enemy.behavior) {
                    case 'aggressive':
                        this.aggressiveAI(enemy, distToPlayer);
                        break;
                    case 'tactical':
                        this.tacticalAI(enemy, distToPlayer);
                        break;
                    case 'support':
                        this.supportAI(enemy, distToPlayer);
                        break;
                    case 'boss':
                        this.bossAI(enemy, distToPlayer);
                        break;
                }
                
                // Attack cooldown
                if (enemy.attackCooldown > 0) enemy.attackCooldown -= 500;
            }

            aggressiveAI(enemy, dist) {
                const angle = Phaser.Math.Angle.Between(enemy.x, enemy.y, this.player.x, this.player.y);
                
                if (dist > 100) {
                    // Charge at player
                    enemy.setRotation(angle);
                    const speed = enemy.enemyType.speed * (enemy.speedMultiplier || 1);
                    enemy.setVelocity(Math.cos(angle) * speed, Math.sin(angle) * speed);
                } else {
                    // Attack
                    enemy.setVelocity(0);
                    if (enemy.attackCooldown <= 0) {
                        this.meleeAttack(enemy, 15);
                        enemy.attackCooldown = 1500;
                    }
                }
                
                // Dodge projectiles
                this.dodgeProjectiles(enemy);
            }

            tacticalAI(enemy, dist) {
                const angle = Phaser.Math.Angle.Between(enemy.x, enemy.y, this.player.x, this.player.y);
                enemy.setRotation(angle);
                
                if (dist < 200) {
                    // Too close, retreat
                    enemy.setVelocity(-Math.cos(angle) * enemy.enemyType.speed, 
                                     -Math.sin(angle) * enemy.enemyType.speed);
                } else if (dist > 400) {
                    // Too far, approach
                    enemy.setVelocity(Math.cos(angle) * enemy.enemyType.speed, 
                                     Math.sin(angle) * enemy.enemyType.speed);
                } else {
                    // Optimal range, attack
                    enemy.setVelocity(0);
                    if (enemy.attackCooldown <= 0) {
                        this.fireEnemyProjectile(enemy, this.player, 20);
                        enemy.attackCooldown = 2000;
                        
                        // Lay mine occasionally
                        if (Math.random() < 0.3) {
                            this.layMine(enemy);
                        }
                    }
                }
                
                this.dodgeProjectiles(enemy);
            }

            supportAI(enemy, dist) {
                // Find damaged ally
                let healTarget = null;
                let minHealth = 1;
                
                this.enemies.getChildren().forEach(ally => {
                    if (ally !== enemy && ally.health / ally.maxHealth < minHealth) {
                        minHealth = ally.health / ally.maxHealth;
                        healTarget = ally;
                    }
                });
                
                if (healTarget && minHealth < 0.5) {
                    // Heal ally
                    const angle = Phaser.Math.Angle.Between(enemy.x, enemy.y, healTarget.x, healTarget.y);
                    const distToAlly = Phaser.Math.Distance.Between(enemy.x, enemy.y, healTarget.x, healTarget.y);
                    
                    if (distToAlly > 150) {
                        enemy.setVelocity(Math.cos(angle) * enemy.enemyType.speed,
                                         Math.sin(angle) * enemy.enemyType.speed);
                    } else {
                        enemy.setVelocity(0);
                        if (enemy.attackCooldown <= 0) {
                            this.healEnemy(healTarget, 20);
                            enemy.attackCooldown = 3000;
                        }
                    }
                } else {
                    // Follow player at distance
                    const angle = Phaser.Math.Angle.Between(enemy.x, enemy.y, this.player.x, this.player.y);
                    if (dist > 300) {
                        enemy.setVelocity(Math.cos(angle) * enemy.enemyType.speed * 0.7,
                                         Math.sin(angle) * enemy.enemyType.speed * 0.7);
                    } else {
                        enemy.setVelocity(-Math.cos(angle) * 50, -Math.sin(angle) * 50);
                    }
                }
            }

            bossAI(enemy, dist) {
                const angle = Phaser.Math.Angle.Between(enemy.x, enemy.y, this.player.x, this.player.y);
                enemy.setRotation(angle);
                
                // Random skill selection based on phase
                if (enemy.attackCooldown <= 0) {
                    const skill = Phaser.Utils.Array.GetRandom(['slam', 'laser', 'summon', 'nova']);
                    
                    switch(skill) {
                        case 'slam':
                            if (dist < 150) {
                                this.createRadialBurst(30, 0xff00ff, 200);
                                this.cameras.main.shake(300, 0.02);
                                enemy.attackCooldown = 3000;
                            }
                            break;
                        case 'laser':
                            this.createBeam(Math.cos(angle), Math.sin(angle), 25, 0xff00ff, 2000);
                            enemy.attackCooldown = 4000;
                            break;
                        case 'summon':
                            this.spawnEnemy('AGGRESSIVE');
                            this.spawnEnemy('AGGRESSIVE');
                            enemy.attackCooldown = 10000;
                            break;
                        case 'nova':
                            this.createExplosion(enemy.x, enemy.y, 400, 40, 0xff00ff);
                            enemy.attackCooldown = 8000;
                            break;
                    }
                }
                
                // Movement
                if (dist < 100) {
                    enemy.setVelocity(-Math.cos(angle) * 100, -Math.sin(angle) * 100);
                } else if (dist > 250) {
                    enemy.setVelocity(Math.cos(angle) * enemy.enemyType.speed,
                                     Math.sin(angle) * enemy.enemyType.speed);
                } else {
                    enemy.setVelocity(
                        Math.sin(angle) * 50,
                        -Math.cos(angle) * 50
                    ); // Strafe
                }
            }

            enterBossPhase(enemy, phaseIdx) {
                this.showFloatingText(enemy.x, enemy.y - 80, `PHASE ${phaseIdx + 2}!`, 0xff00ff, 28);
                enemy.setTint(0xff0000);
                this.time.delayedCall(500, () => enemy.clearTint());
                
                // Heal slightly
                enemy.health = Math.min(enemy.health + 100, enemy.maxHealth);
            }

            dodgeProjectiles(enemy) {
                this.projectiles.getChildren().forEach(proj => {
                    if (proj.owner === 'player') {
                        const dist = Phaser.Math.Distance.Between(enemy.x, enemy.y, proj.x, proj.y);
                        if (dist < 100) {
                            const angle = Phaser.Math.Angle.Between(proj.x, proj.y, enemy.x, enemy.y);
                            enemy.body.velocity.x += Math.cos(angle) * 200;
                            enemy.body.velocity.y += Math.sin(angle) * 200;
                        }
                    }
                });
            }

            meleeAttack(enemy, damage) {
                const dist = Phaser.Math.Distance.Between(enemy.x, enemy.y, this.player.x, this.player.y);
                if (dist < 80) {
                    this.damagePlayer(damage);
                    
                    // Visual
                    const slash = this.add.graphics();
                    slash.lineStyle(3, enemy.enemyType.color);
                    slash.beginPath();
                    slash.moveTo(enemy.x, enemy.y);
                    slash.lineTo(this.player.x, this.player.y);
                    slash.strokePath();
                    this.time.delayedCall(100, () => slash.destroy());
                }
            }

            fireEnemyProjectile(enemy, target, damage) {
                const angle = Phaser.Math.Angle.Between(enemy.x, enemy.y, target.x, target.y);
                const proj = this.physics.add.sprite(
                    enemy.x + Math.cos(angle) * 40,
                    enemy.y + Math.sin(angle) * 40,
                    'proj_plasma'
                );
                proj.setTint(enemy.enemyType.color);
                proj.setVelocity(Math.cos(angle) * 350, Math.sin(angle) * 350);
                proj.damage = damage;
                proj.owner = 'enemy';
                
                this.projectiles.add(proj);
                
                this.time.delayedCall(2000, () => {
                    if (proj.active) proj.destroy();
                });
            }

            layMine(enemy) {
                const mine = this.physics.add.sprite(enemy.x, enemy.y, 'hazard');
                mine.setScale(0.5);
                mine.isMine = true;
                
                this.time.delayedCall(5000, () => {
                    if (mine.active) {
                        this.createExplosion(mine.x, mine.y, 100, 30, 0xff4400);
                        mine.destroy();
                    }
                });
                
                // Check player proximity
                const checkTimer = this.time.addEvent({
                    delay: 100,
                    callback: () => {
                        if (!mine.active) {
                            checkTimer.remove();
                            return;
                        }
                        const dist = Phaser.Math.Distance.Between(mine.x, mine.y, this.player.x, this.player.y);
                        if (dist < 60) {
                            this.createExplosion(mine.x, mine.y, 100, 30, 0xff4400);
                            mine.destroy();
                            checkTimer.remove();
                        }
                    },
                    callbackScope: this,
                    loop: true
                });
            }

            healEnemy(enemy, amount) {
                enemy.health = Math.min(enemy.health + amount, enemy.maxHealth);
                this.showFloatingText(enemy.x, enemy.y - 40, `+${amount}`, 0x00ff88, 14);
                
                // Visual
                const heal = this.add.circle(enemy.x, enemy.y, 30, 0x00ff88, 0.5);
                this.tweens.add({
                    targets: heal,
                    scale: 2,
                    alpha: 0,
                    duration: 500,
                    onComplete: () => heal.destroy()
                });
            }

            // Damage and effects
            damagePlayer(amount) {
                if (this.player.isDead) return;
                
                // Apply damage reduction
                if (this.player.damageReduction) {
                    amount *= (1 - this.player.damageReduction);
                }
                
                this.player.health -= amount;
                
                // Visual feedback
                this.cameras.main.shake(100, 0.01);
                this.player.setTint(0xff0000);
                this.time.delayedCall(100, () => {
                    if (this.player.active) this.player.setTint(this.selectedMage.color);
                });
                
                this.showFloatingText(this.player.x, this.player.y - 40, `-${Math.floor(amount)}`, 0xff0044, 16);
                
                if (this.player.health <= 0) {
                    this.playerDies();
                }
            }

            healPlayer(amount) {
                if (this.player.isDead) return;
                this.player.health = Math.min(this.player.health + amount, this.player.maxHealth);
                this.showFloatingText(this.player.x, this.player.y - 40, `+${Math.floor(amount)}`, 0x00ff88, 14);
            }

            damageEnemy(enemy, damage) {
                enemy.health -= damage;
                
                // Flash effect
                enemy.setTint(0xffffff);
                this.time.delayedCall(50, () => {
                    if (enemy.active) enemy.setTint(enemy.enemyType.color);
                });
                
                // Knockback
                const angle = Phaser.Math.Angle.Between(this.player.x, this.player.y, enemy.x, enemy.y);
                enemy.body.velocity.x += Math.cos(angle) * 100;
                enemy.body.velocity.y += Math.sin(angle) * 100;
                
                if (enemy.health <= 0) {
                    this.enemyDies(enemy);
                }
            }

            enemyDies(enemy) {
                // Score
                this.score++;
                
                // Death effect
                this.createExplosion(enemy.x, enemy.y, 60, 0, enemy.enemyType.color);
                
                // Drop energy orb
                if (Math.random() < 0.3) {
                    this.spawnEnergyOrb(enemy.x, enemy.y);
                }
                
                // Remove AI timer
                if (enemy.aiTimer) enemy.aiTimer.remove();
                
                enemy.destroy();
            }

            playerDies() {
                this.player.isDead = true;
                this.player.setVelocity(0);
                
                // Death explosion
                this.createExplosion(this.player.x, this.player.y, 100, 0, this.selectedMage.color);
                this.player.setVisible(false);
                this.player.aura.setVisible(false);
                
                // Game over
                this.time.delayedCall(1000, () => {
                    this.showGameOver(false);
                });
            }

            spawnEnergyOrb(x, y) {
                const orb = this.physics.add.sprite(x, y, 'proj_nano');
                orb.setTint(0x00aaff);
                
                this.tweens.add({
                    targets: orb,
                    scale: 1.2,
                    yoyo: true,
                    duration: 500,
                    repeat: -1
                });
                
                // Magnet to player
                const magnetTimer = this.time.addEvent({
                    delay: 50,
                    callback: () => {
                        if (!orb.active) {
                            magnetTimer.remove();
                            return;
                        }
                        
                        const dist = Phaser.Math.Distance.Between(orb.x, orb.y, this.player.x, this.player.y);
                        if (dist < 300) {
                            const angle = Phaser.Math.Angle.Between(orb.x, orb.y, this.player.x, this.player.y);
                            orb.body.velocity.x = Math.cos(angle) * 200;
                            orb.body.velocity.y = Math.sin(angle) * 200;
                        }
                        
                        if (dist < 30) {
                            this.player.energy = Math.min(this.player.energy + 20, CONSTANTS.ENERGY_MAX);
                            this.showFloatingText(this.player.x, this.player.y - 60, '+ENERGY', 0x00aaff, 14);
                            orb.destroy();
                            magnetTimer.remove();
                        }
                    },
                    callbackScope: this,
                    loop: true
                });
            }

            stunEnemy(enemy, duration) {
                enemy.isStunned = true;
                enemy.setTint(0xffff00);
                
                this.time.delayedCall(duration, () => {
                    if (enemy.active) {
                        enemy.isStunned = false;
                        enemy.clearTint();
                    }
                });
            }

            silenceEnemy(enemy, duration) {
                enemy.isSilenced = true;
                const icon = this.add.text(enemy.x, enemy.y - 50, '🔇', {
                    fontSize: '20px'
                }).setOrigin(0.5);
                
                const followTimer = this.time.addEvent({
                    delay: 50,
                    callback: () => {
                        if (!enemy.active) {
                            icon.destroy();
                            followTimer.remove();
                            return;
                        }
                        icon.setPosition(enemy.x, enemy.y - 50);
                    },
                    callbackScope: this,
                    loop: true
                });
                
                this.time.delayedCall(duration, () => {
                    if (enemy.active) enemy.isSilenced = false;
                    icon.destroy();
                    followTimer.remove();
                });
            }

            // Visual effects
            createExplosion(x, y, radius, damage, color) {
                const explosion = this.add.circle(x, y, 10, color, 0.8);
                
                this.tweens.add({
                    targets: explosion,
                    radius: radius,
                    alpha: 0,
                    duration: 400,
                    onComplete: () => explosion.destroy()
                });
                
                // Shockwave
                const shockwave = this.add.circle(x, y, radius, color, 0);
                shockwave.setStrokeStyle(4, color);
                
                this.tweens.add({
                    targets: shockwave,
                    radius: radius * 2,
                    alpha: 0,
                    duration: 600,
                    onComplete: () => shockwave.destroy()
                });
            }

            createImpactEffect(x, y, type) {
                const color = type.includes('void') ? 0x9d00ff : 
                             type.includes('plasma') ? 0xff4400 :
                             type.includes('lightning') ? 0x00ffff : 0xffffff;
                
                const impact = this.add.circle(x, y, 20, color, 0.6);
                this.tweens.add({
                    targets: impact,
                    scale: 0,
                    alpha: 0,
                    duration: 300,
                    onComplete: () => impact.destroy()
                });
            }

            createTeleportEffect(x, y) {
                const ring = this.add.circle(x, y, 10, 0x00ffff, 0);
                ring.setStrokeStyle(3, 0x00ffff);
                
                this.tweens.add({
                    targets: ring,
                    radius: 60,
                    alpha: 0,
                    duration: 400,
                    onComplete: () => ring.destroy()
                });
            }

            createSkillCastEffect() {
                const burst = this.add.circle(this.player.x, this.player.y, 40, this.selectedMage.color, 0.5);
                this.tweens.add({
                    targets: burst,
                    scale: 2,
                    alpha: 0,
                    duration: 300,
                    onComplete: () => burst.destroy()
                });
            }

            createClockEffect(x, y) {
                const clock = this.add.circle(x, y, 30, 0xffd700, 0.3);
                const hand = this.add.rectangle(x, y, 2, 25, 0xffd700);
                
                this.tweens.add({
                    targets: hand,
                    rotation: Math.PI * 2,
                    duration: 1000,
                    repeat: 2,
                    onComplete: () => {
                        clock.destroy();
                        hand.destroy();
                    }
                });
            }

            createHealEffect(x, y) {
                const cross = this.add.text(x, y, '+', {
                    fontFamily: 'Courier New',
                    fontSize: '40px',
                    color: '#00ff88'
                }).setOrigin(0.5);
                
                this.tweens.add({
                    targets: cross,
                    y: y - 50,
                    alpha: 0,
                    duration: 800,
                    onComplete: () => cross.destroy()
                });
            }

            showFloatingText(x, y, text, color, size) {
                const hexColor = color.toString(16).padStart(6, '0');
                const txt = this.add.text(x, y, text, {
                    fontFamily: 'Courier New',
                    fontSize: `${size}px`,
                    fontStyle: 'bold',
                    color: `#${hexColor}`,
                    stroke: '#000000',
                    strokeThickness: 3
                }).setOrigin(0.5);
                
                this.tweens.add({
                    targets: txt,
                    y: y - 60,
                    alpha: 0,
                    duration: 1000,
                    onComplete: () => txt.destroy()
                });
            }

            updateEffects() {
                // Update construct positions
                this.constructs.getChildren().forEach(construct => {
                    if (construct.health <= 0) {
                        this.createExplosion(construct.x, construct.y, 50, 0, 0x00ff88);
                        construct.destroy();
                    }
                });
            }

            updateMatchTimer() {
                this.matchTime--;
                const minutes = Math.floor(this.matchTime / 60);
                const seconds = this.matchTime % 60;
                this.timerText.setText(`${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`);
                
                if (this.matchTime <= 0) {
                    this.showGameOver(true);
                }
            }

            checkGameState() {
                // Check win condition
                if (this.enemies.countActive() === 0 && this.gameMode !== 'survival') {
                    this.time.delayedCall(1000, () => this.showGameOver(true));
                }
            }

            showGameOver(victory) {
                const overlay = this.add.rectangle(
                    this.cameras.main.centerX,
                    this.cameras.main.centerY,
                    this.cameras.main.width,
                    this.cameras.main.height,
                    0x000000,
                    0.8
                ).setScrollFactor(0);
                
                const title = this.add.text(
                    this.cameras.main.centerX,
                    this.cameras.main.centerY - 50,
                    victory ? 'VICTORY' : 'DEFEAT',
                    {
                        fontFamily: 'Courier New',
                        fontSize: '48px',
                        fontStyle: 'bold',
                        color: victory ? '#00ff88' : '#ff0044'
                    }
                ).setOrigin(0.5).setScrollFactor(0);
                
                const stats = this.add.text(
                    this.cameras.main.centerX,
                    this.cameras.main.centerY + 20,
                    `Kills: ${this.score}\nWave: ${this.waveNumber}`,
                    {
                        fontFamily: 'Courier New',
                        fontSize: '20px',
                        color: '#ffffff',
                        align: 'center'
                    }
                ).setOrigin(0.5).setScrollFactor(0);
                
                const restartBtn = this.add.text(
                    this.cameras.main.centerX,
                    this.cameras.main.centerY + 100,
                    'PLAY AGAIN',
                    {
                        fontFamily: 'Courier New',
                        fontSize: '24px',
                        color: '#00aaff',
                        backgroundColor: '#1a1a3a',
                        padding: { x: 20, y: 10 }
                    }
                ).setOrigin(0.5).setScrollFactor(0).setInteractive();
                
                restartBtn.on('pointerdown', () => {
                    this.scene.restart({ mode: this.gameMode, mageClass: this.selectedMage.id });
                });
                
                const menuBtn = this.add.text(
                    this.cameras.main.centerX,
                    this.cameras.main.centerY + 160,
                    'MAIN MENU',
                    {
                        fontFamily: 'Courier New',
                        fontSize: '20px',
                        color: '#ffffff'
                    }
                ).setOrigin(0.5).setScrollFactor(0).setInteractive();
                
                menuBtn.on('pointerdown', () => {
                    this.scene.start('MenuScene');
                });
            }
        }

        // ==========================================
        // GAME CONFIGURATION
        // ==========================================
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            parent: 'game-container',
            backgroundColor: '#050510',
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { x: 0, y: 0 },
                    debug: false
                }
            },
            scale: {
                mode: Phaser.Scale.RESIZE,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            scene: [BootScene, MenuScene, SelectScene, GameScene]
        };

        // Initialize game
        const game = new Phaser.Game(config);

        // Handle window resize
        window.addEventListener('resize', () => {
            game.scale.resize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
