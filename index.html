<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCANE NEXUS: SCI-FI MAGE ARENA</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        
        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.1) 50%,
                rgba(0,0,0,0.1)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1000;
            animation: scanlineMove 10s linear infinite;
        }
        
        @keyframes scanlineMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }
        
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <script>
        // ==========================================
        // ARCANE NEXUS: COMPLETE WORKING GAME
        // ==========================================

        const CONSTANTS = {
            WORLD_WIDTH: 1600,
            WORLD_HEIGHT: 1200,
            PLAYER_SPEED: 300,
            ENERGY_MAX: 100,
            OVERLOAD_MAX: 100,
            OVERLOAD_THRESHOLD: 80
        };

        const MAGES = {
            VOID: {
                id: 'void',
                name: 'VOID MAGE',
                color: 0x9d00ff,
                desc: 'Gravity control and black holes',
                health: 100,
                skills: ['Gravity Well', 'Void Orb', 'Shield'],
                ultimate: 'Black Hole'
            },
            FLAME: {
                id: 'flame',
                name: 'FLAME MAGE',
                color: 0xff4400,
                desc: 'Plasma fire and explosions',
                health: 90,
                skills: ['Fire Beam', 'Fireball', 'Dash'],
                ultimate: 'Supernova'
            },
            LIGHTNING: {
                id: 'lightning',
                name: 'STORM MAGE',
                color: 0x00ffff,
                desc: 'Lightning and teleportation',
                health: 80,
                skills: ['Chain Lightning', 'Teleport', 'Strike'],
                ultimate: 'EMP Blast'
            },
            CHRONO: {
                id: 'chrono',
                name: 'CHRONO MAGE',
                color: 0xffd700,
                desc: 'Time manipulation',
                health: 85,
                skills: ['Slow Field', 'Rewind', 'Haste'],
                ultimate: 'Time Stop'
            },
            NANO: {
                id: 'nano',
                name: 'NANO MAGE',
                color: 0x00ff88,
                desc: 'Healing and constructs',
                health: 110,
                skills: ['Heal', 'Drone', 'Barrier'],
                ultimate: 'Healing Zone'
            }
        };

        // ==========================================
        // BOOT SCENE - Generate all textures
        // ==========================================
        class BootScene extends Phaser.Scene {
            constructor() {
                super({ key: 'BootScene' });
            }

            preload() {
                this.createTextures();
            }

            createTextures() {
                const g = this.make.graphics({ x: 0, y: 0, add: false });
                
                // Player
                g.fillStyle(0xffffff);
                g.fillCircle(32, 32, 30);
                g.generateTexture('player', 64, 64);
                g.clear();

                // Enemy
                g.fillStyle(0xff0044);
                g.fillTriangle(32, 8, 56, 56, 8, 56);
                g.generateTexture('enemy', 64, 64);
                g.clear();

                // Boss
                g.fillStyle(0xff00ff);
                g.fillCircle(32, 32, 35);
                g.generateTexture('boss', 70, 70);
                g.clear();

                // Projectile
                g.fillStyle(0xffff00);
                g.fillCircle(8, 8, 8);
                g.generateTexture('bullet', 16, 16);
                g.clear();

                // Skill icons
                Object.values(MAGES).forEach(mage => {
                    g.fillStyle(0x1a1a3a);
                    g.fillRect(0, 0, 64, 64);
                    g.lineStyle(3, mage.color);
                    g.strokeRect(2, 2, 60, 60);
                    g.fillStyle(mage.color);
                    g.fillCircle(32, 32, 20);
                    g.generateTexture(`icon_${mage.id}`, 64, 64);
                    g.clear();
                });

                // Joystick
                g.fillStyle(0x333333, 0.5);
                g.fillCircle(64, 64, 60);
                g.lineStyle(2, 0xffffff, 0.3);
                g.strokeCircle(64, 64, 60);
                g.generateTexture('joybase', 128, 128);
                g.clear();

                g.fillStyle(0xffffff, 0.8);
                g.fillCircle(32, 32, 25);
                g.generateTexture('joystick', 64, 64);
                g.clear();

                // Bars
                g.fillStyle(0x000000, 0.8);
                g.fillRect(0, 0, 200, 20);
                g.generateTexture('barbg', 200, 20);
                g.clear();

                g.fillStyle(0x00ff44);
                g.fillRect(0, 0, 200, 20);
                g.generateTexture('healthbar', 200, 20);
                g.clear();

                g.fillStyle(0x00aaff);
                g.fillRect(0, 0, 200, 20);
                g.generateTexture('energybar', 200, 20);
                g.clear();

                g.fillStyle(0xff0044);
                g.fillRect(0, 0, 200, 20);
                g.generateTexture('overloadbar', 200, 20);
                g.clear();

                // Floor
                g.fillStyle(0x0a0a1a);
                g.fillRect(0, 0, 64, 64);
                g.lineStyle(1, 0x1a1a3a);
                g.strokeRect(0, 0, 64, 64);
                g.generateTexture('floor', 64, 64);
                g.clear();

                // Wall
                g.fillStyle(0x2a2a4a);
                g.fillRect(0, 0, 64, 64);
                g.generateTexture('wall', 64, 64);
            }

            create() {
                this.scene.start('MenuScene');
            }
        }

        // ==========================================
        // MENU SCENE - Working menu with all buttons
        // ==========================================
        class MenuScene extends Phaser.Scene {
            constructor() {
                super({ key: 'MenuScene' });
            }

            create() {
                this.createBackground();
                
                // Title
                this.add.text(this.cameras.main.centerX, 80, 'ARCANE NEXUS', {
                    fontSize: '48px',
                    fontStyle: 'bold',
                    color: '#00aaff'
                }).setOrigin(0.5);

                this.add.text(this.cameras.main.centerX, 140, 'SCI-FI MAGE ARENA', {
                    fontSize: '24px',
                    color: '#ff00ff'
                }).setOrigin(0.5);

                // Menu buttons
                const buttons = [
                    { text: 'PLAY NOW', y: 250, action: () => this.scene.start('SelectScene') },
                    { text: 'SURVIVAL MODE', y: 330, action: () => this.startGame('survival', 'void') },
                    { text: 'BOSS BATTLE', y: 410, action: () => this.startGame('boss', 'void') }
                ];

                buttons.forEach(btn => {
                    this.createButton(btn.text, btn.y, btn.action);
                });

                // Instructions
                this.add.text(this.cameras.main.centerX, 550, 
                    'WASD or Left Stick to Move\nMouse or Right Stick to Aim\nClick skills or press Q,E,R,SPACE', {
                    fontSize: '16px',
                    color: '#888888',
                    align: 'center'
                }).setOrigin(0.5);
            }

            createBackground() {
                const graphics = this.add.graphics();
                for (let i = 0; i < 100; i++) {
                    graphics.fillStyle(0xffffff, Math.random() * 0.5);
                    graphics.fillCircle(
                        Math.random() * this.cameras.main.width,
                        Math.random() * this.cameras.main.height,
                        Math.random() * 2
                    );
                }
            }

            createButton(text, y, callback) {
                const container = this.add.container(this.cameras.main.centerX, y);
                
                const bg = this.add.rectangle(0, 0, 300, 60, 0x1a1a3a)
                    .setStrokeStyle(3, 0x00aaff);
                
                const txt = this.add.text(0, 0, text, {
                    fontSize: '24px',
                    color: '#ffffff'
                }).setOrigin(0.5);

                container.add([bg, txt]);
                container.setSize(300, 60);
                container.setInteractive({ useHandCursor: true });

                container.on('pointerover', () => {
                    bg.setFillStyle(0x2a2a5a);
                    txt.setColor('#00ffff');
                });

                container.on('pointerout', () => {
                    bg.setFillStyle(0x1a1a3a);
                    txt.setColor('#ffffff');
                });

                container.on('pointerdown', callback);
            }

            startGame(mode, mage) {
                this.scene.start('GameScene', { mode: mode, mage: mage });
            }
        }

        // ==========================================
        // SELECT SCENE - Choose your mage
        // ==========================================
        class SelectScene extends Phaser.Scene {
            constructor() {
                super({ key: 'SelectScene' });
            }

            create() {
                this.add.text(this.cameras.main.centerX, 60, 'SELECT YOUR MAGE', {
                    fontSize: '36px',
                    color: '#ffffff'
                }).setOrigin(0.5);

                const mageList = Object.values(MAGES);
                const startX = this.cameras.main.centerX - ((mageList.length - 1) * 80);

                mageList.forEach((mage, index) => {
                    this.createMageCard(mage, startX + index * 160, 200);
                });

                // Back button
                const back = this.add.text(50, this.cameras.main.height - 50, '< BACK', {
                    fontSize: '20px',
                    color: '#00aaff'
                }).setInteractive({ useHandCursor: true });

                back.on('pointerdown', () => this.scene.start('MenuScene'));
            }

            createMageCard(mage, x, y) {
                const container = this.add.container(x, y);
                
                // Card background
                const bg = this.add.rectangle(0, 0, 140, 200, 0x0a0a1a)
                    .setStrokeStyle(2, mage.color);
                
                // Mage circle
                const circle = this.add.circle(0, -50, 40, mage.color);
                const initial = this.add.text(0, -50, mage.name[0], {
                    fontSize: '40px',
                    fontStyle: 'bold',
                    color: '#ffffff'
                }).setOrigin(0.5);

                // Name
                const nameText = this.add.text(0, 10, mage.name.split(' ')[0], {
                    fontSize: '14px',
                    color: '#ffffff'
                }).setOrigin(0.5);

                // Description
                const descText = this.add.text(0, 50, mage.desc, {
                    fontSize: '10px',
                    color: '#aaaaaa',
                    align: 'center',
                    wordWrap: { width: 120 }
                }).setOrigin(0.5);

                // Select button
                const selectBtn = this.add.rectangle(0, 80, 100, 30, mage.color)
                    .setInteractive({ useHandCursor: true });
                
                const selectText = this.add.text(0, 80, 'SELECT', {
                    fontSize: '14px',
                    color: '#000000',
                    fontStyle: 'bold'
                }).setOrigin(0.5);

                container.add([bg, circle, initial, nameText, descText, selectBtn, selectText]);
                container.setSize(140, 200);

                // Hover effects
                container.setInteractive();
                container.on('pointerover', () => {
                    bg.setStrokeStyle(4, 0xffffff);
                    container.setScale(1.05);
                });
                container.on('pointerout', () => {
                    bg.setStrokeStyle(2, mage.color);
                    container.setScale(1);
                });

                selectBtn.on('pointerdown', () => {
                    this.scene.start('GameScene', { mode: 'arena', mage: mage.id });
                });
            }
        }

        // ==========================================
        // GAME SCENE - Fully playable
        // ==========================================
        class GameScene extends Phaser.Scene {
            constructor() {
                super({ key: 'GameScene' });
            }

            init(data) {
                this.gameMode = data.mode || 'arena';
                this.selectedMageId = data.mage || 'void';
                this.selectedMage = MAGES[this.selectedMageId.toUpperCase()];
                this.score = 0;
                this.wave = 1;
            }

            create() {
                // Setup physics
                this.physics.world.setBounds(0, 0, CONSTANTS.WORLD_WIDTH, CONSTANTS.WORLD_HEIGHT);
                
                // Create arena
                this.createArena();
                
                // Create player
                this.createPlayer();
                
                // Create enemies
                this.spawnEnemies();
                
                // Setup camera
                this.cameras.main.setBounds(0, 0, CONSTANTS.WORLD_WIDTH, CONSTANTS.WORLD_HEIGHT);
                this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
                this.cameras.main.setZoom(0.7);

                // Setup controls
                this.setupControls();
                this.setupKeyboard();
                
                // Create UI
                this.createUI();
                
                // Groups
                this.bullets = this.physics.add.group();
                this.enemies = this.physics.add.group();
                this.effects = this.add.group();

                // Collisions
                this.setupCollisions();

                // Timers
                this.time.addEvent({ delay: 1000, callback: this.regenEnergy, callbackScope: this, loop: true });
                
                if (this.gameMode === 'survival') {
                    this.time.addEvent({ delay: 10000, callback: this.nextWave, callbackScope: this, loop: true });
                }
            }

            createArena() {
                // Floor tiles
                for (let x = 0; x < CONSTANTS.WORLD_WIDTH; x += 64) {
                    for (let y = 0; y < CONSTANTS.WORLD_HEIGHT; y += 64) {
                        this.add.image(x + 32, y + 32, 'floor').setAlpha(0.5);
                    }
                }

                // Walls (arena boundary)
                this.walls = this.physics.add.staticGroup();
                
                // Border walls
                for (let x = 0; x < CONSTANTS.WORLD_WIDTH; x += 64) {
                    this.walls.create(x + 32, 32, 'wall');
                    this.walls.create(x + 32, CONSTANTS.WORLD_HEIGHT - 32, 'wall');
                }
                for (let y = 64; y < CONSTANTS.WORLD_HEIGHT - 64; y += 64) {
                    this.walls.create(32, y + 32, 'wall');
                    this.walls.create(CONSTANTS.WORLD_WIDTH - 32, y + 32, 'wall');
                }

                // Random obstacles
                const obstacleCount = this.gameMode === 'boss' ? 6 : 12;
                for (let i = 0; i < obstacleCount; i++) {
                    const x = Phaser.Math.Between(200, CONSTANTS.WORLD_WIDTH - 200);
                    const y = Phaser.Math.Between(200, CONSTANTS.WORLD_HEIGHT - 200);
                    this.walls.create(x, y, 'wall');
                }
            }

            createPlayer() {
                const x = CONSTANTS.WORLD_WIDTH / 2;
                const y = CONSTANTS.WORLD_HEIGHT / 2;

                this.player = this.physics.add.sprite(x, y, 'player');
                this.player.setCollideWorldBounds(true);
                this.player.setDrag(800);
                
                // Stats
                this.player.mage = this.selectedMage;
                this.player.maxHealth = this.selectedMage.health;
                this.player.health = this.selectedMage.health;
                this.player.energy = CONSTANTS.ENERGY_MAX;
                this.player.overload = 0;
                this.player.speed = 1;
                
                // Visual
                this.player.setTint(this.selectedMage.color);
                
                // Cooldowns
                this.cooldowns = { q: 0, e: 0, r: 0, space: 0 };
            }

            spawnEnemies() {
                const count = this.gameMode === 'boss' ? 1 : (this.gameMode === 'survival' ? 3 + this.wave : 5);
                
                for (let i = 0; i < count; i++) {
                    this.spawnEnemy();
                }
            }

            spawnEnemy() {
                const isBoss = this.gameMode === 'boss';
                const angle = Math.random() * Math.PI * 2;
                const dist = 400 + Math.random() * 200;
                const x = this.player.x + Math.cos(angle) * dist;
                const y = this.player.y + Math.sin(angle) * dist;

                const enemy = this.physics.add.sprite(x, y, isBoss ? 'boss' : 'enemy');
                enemy.setCircle(isBoss ? 35 : 30);
                
                enemy.isBoss = isBoss;
                enemy.health = isBoss ? 500 : 80;
                enemy.maxHealth = enemy.health;
                enemy.speed = isBoss ? 100 : 150;
                enemy.attackTimer = 0;
                
                this.enemies.add(enemy);

                // Simple AI
                this.time.addEvent({
                    delay: 500,
                    callback: () => this.updateEnemyAI(enemy),
                    callbackScope: this,
                    loop: true
                });
            }

            nextWave() {
                this.wave++;
                this.spawnEnemies();
                this.showMessage(`WAVE ${this.wave}`, 0xff0044);
            }

            setupControls() {
                // Virtual joysticks
                this.joystickL = { active: false, baseX: 120, baseY: this.cameras.main.height - 120, x: 120, y: this.cameras.main.height - 120 };
                this.joystickR = { active: false, baseX: this.cameras.main.width - 120, baseY: this.cameras.main.height - 120, x: this.cameras.main.width - 120, y: this.cameras.main.height - 120 };

                // Visuals
                this.joyLBase = this.add.image(this.joystickL.baseX, this.joystickL.baseY, 'joybase').setScrollFactor(0).setAlpha(0.4);
                this.joyLStick = this.add.image(this.joystickL.x, this.joystickL.y, 'joystick').setScrollFactor(0).setAlpha(0.6);
                
                this.joyRBase = this.add.image(this.joystickR.baseX, this.joystickR.baseY, 'joybase').setScrollFactor(0).setAlpha(0.4);
                this.joyRStick = this.add.image(this.joystickR.x, this.joystickR.y, 'joystick').setScrollFactor(0).setAlpha(0.6);

                // Touch input
                this.input.on('pointerdown', (pointer) => {
                    if (pointer.x < this.cameras.main.width / 2) {
                        this.joystickL.active = true;
                        this.joystickL.pointer = pointer;
                        this.updateJoystick(this.joystickL, pointer, this.joyLBase, this.joyLStick);
                    } else {
                        this.joystickR.active = true;
                        this.joystickR.pointer = pointer;
                        this.updateJoystick(this.joystickR, pointer, this.joyRBase, this.joyRStick);
                    }
                });

                this.input.on('pointermove', (pointer) => {
                    if (this.joystickL.active && this.joystickL.pointer === pointer) {
                        this.updateJoystick(this.joystickL, pointer, this.joyLBase, this.joyLStick);
                    }
                    if (this.joystickR.active && this.joystickR.pointer === pointer) {
                        this.updateJoystick(this.joystickR, pointer, this.joyRBase, this.joyRStick);
                    }
                });

                this.input.on('pointerup', (pointer) => {
                    if (this.joystickL.pointer === pointer) {
                        this.joystickL.active = false;
                        this.joyLBase.setPosition(120, this.cameras.main.height - 120);
                        this.joyLStick.setPosition(120, this.cameras.main.height - 120);
                    }
                    if (this.joystickR.pointer === pointer) {
                        this.joystickR.active = false;
                        this.joyRBase.setPosition(this.cameras.main.width - 120, this.cameras.main.height - 120);
                        this.joyRStick.setPosition(this.cameras.main.width - 120, this.cameras.main.height - 120);
                    }
                });
            }

            updateJoystick(joy, pointer, base, stick) {
                const maxDist = 50;
                const dx = pointer.x - joy.baseX;
                const dy = pointer.y - joy.baseY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const clamped = Math.min(dist, maxDist);
                const angle = Math.atan2(dy, dx);

                joy.x = joy.baseX + Math.cos(angle) * clamped;
                joy.y = joy.baseY + Math.sin(angle) * clamped;
                joy.dx = Math.cos(angle) * (clamped / maxDist);
                joy.dy = Math.sin(angle) * (clamped / maxDist);

                base.setPosition(joy.baseX, joy.baseY);
                stick.setPosition(joy.x, joy.y);
            }

            setupKeyboard() {
                this.keys = this.input.keyboard.addKeys({
                    w: Phaser.Input.Keyboard.KeyCodes.W,
                    a: Phaser.Input.Keyboard.KeyCodes.A,
                    s: Phaser.Input.Keyboard.KeyCodes.S,
                    d: Phaser.Input.Keyboard.KeyCodes.D,
                    q: Phaser.Input.Keyboard.KeyCodes.Q,
                    e: Phaser.Input.Keyboard.KeyCodes.E,
                    r: Phaser.Input.Keyboard.KeyCodes.R,
                    space: Phaser.Input.Keyboard.KeyCodes.SPACE
                });

                // Mouse aim
                this.input.on('pointermove', (pointer) => {
                    if (this.player && this.player.active) {
                        const worldPoint = this.cameras.main.getWorldPoint(pointer.x, pointer.y);
                        this.player.rotation = Phaser.Math.Angle.Between(
                            this.player.x, this.player.y,
                            worldPoint.x, worldPoint.y
                        );
                    }
                });

                // Click to shoot basic attack
                this.input.on('pointerdown', (pointer) => {
                    if (pointer.x > this.cameras.main.width / 2 && !this.joystickR.active) {
                        this.basicAttack();
                    }
                });
            }

            createUI() {
                // Health
                this.add.image(120, 40, 'barbg').setScrollFactor(0);
                this.healthFill = this.add.image(120, 40, 'healthbar').setScrollFactor(0);
                this.add.text(20, 35, 'HP', { fontSize: '14px', color: '#fff' }).setScrollFactor(0);

                // Energy
                this.add.image(120, 70, 'barbg').setScrollFactor(0);
                this.energyFill = this.add.image(120, 70, 'energybar').setScrollFactor(0);
                this.overloadFill = this.add.image(120, 70, 'overloadbar').setScrollFactor(0).setAlpha(0);
                this.add.text(20, 65, 'NRG', { fontSize: '14px', color: '#fff' }).setScrollFactor(0);

                // Skill buttons
                const skillY = this.cameras.main.height - 80;
                const skills = this.selectedMage.skills;
                
                this.skillButtons = skills.map((skill, i) => {
                    const x = this.cameras.main.width / 2 - 80 + i * 80;
                    const btn = this.add.container(x, skillY);
                    
                    const bg = this.add.rectangle(0, 0, 70, 70, 0x1a1a3a)
                        .setStrokeStyle(3, this.selectedMage.color);
                    
                    const icon = this.add.image(0, 0, `icon_${this.selectedMage.id}`).setDisplaySize(50, 50);
                    const key = this.add.text(0, 45, ['Q', 'E', 'R'][i], { fontSize: '12px', color: '#fff' }).setOrigin(0.5);
                    const cd = this.add.rectangle(0, 0, 70, 70, 0x000000, 0.7).setVisible(false);
                    
                    btn.add([bg, icon, key, cd]);
                    btn.setScrollFactor(0);
                    btn.cooldownOverlay = cd;
                    
                    // Click handler
                    bg.setInteractive();
                    bg.on('pointerdown', () => this.useSkill(i));
                    
                    return btn;
                });

                // Ultimate button
                this.ultButton = this.add.container(this.cameras.main.width / 2 + 160, skillY);
                const ultBg = this.add.rectangle(0, 0, 80, 80, 0xffd700)
                    .setStrokeStyle(3, 0xffffff);
                const ultIcon = this.add.image(0, 0, `icon_${this.selectedMage.id}`).setDisplaySize(60, 60);
                const ultKey = this.add.text(0, 50, 'SPACE', { fontSize: '12px', color: '#000', fontStyle: 'bold' }).setOrigin(0.5);
                this.ultCd = this.add.rectangle(0, 0, 80, 80, 0x000000, 0.7).setVisible(false);
                
                this.ultButton.add([ultBg, ultIcon, ultKey, this.ultCd]);
                this.ultButton.setScrollFactor(0);
                
                ultBg.setInteractive();
                ultBg.on('pointerdown', () => this.useUltimate());

                // Score
                this.scoreText = this.add.text(this.cameras.main.width - 20, 20, 'Kills: 0', {
                    fontSize: '20px', color: '#fff'
                }).setOrigin(1, 0).setScrollFactor(0);

                // Warning
                this.warningText = this.add.text(this.cameras.main.centerX, 150, 'OVERLOAD WARNING!', {
                    fontSize: '24px', color: '#ff0044', fontStyle: 'bold'
                }).setOrigin(0.5).setScrollFactor(0).setVisible(false);
            }

            setupCollisions() {
                this.physics.add.collider(this.player, this.walls);
                this.physics.add.collider(this.enemies, this.walls);
                this.physics.add.collider(this.bullets, this.walls, (bullet) => bullet.destroy());

                this.physics.add.overlap(this.bullets, this.enemies, (bullet, enemy) => {
                    if (bullet.owner === 'player') {
                        this.damageEnemy(enemy, bullet.damage);
                        bullet.destroy();
                    }
                });

                this.physics.add.overlap(this.bullets, this.player, (bullet, player) => {
                    if (bullet.owner === 'enemy') {
                        this.damagePlayer(bullet.damage);
                        bullet.destroy();
                    }
                });

                this.physics.add.overlap(this.player, this.enemies, (player, enemy) => {
                    if (!player.invulnerable) {
                        this.damagePlayer(10);
                        player.invulnerable = true;
                        this.time.delayedCall(1000, () => player.invulnerable = false);
                    }
                });
            }

            update(time, delta) {
                if (!this.player.active) return;

                // Movement
                this.handleMovement();
                
                // Cooldowns
                this.updateCooldowns(delta);
                
                // UI
                this.updateUI();
                
                // Overload check
                if (this.player.overload >= CONSTANTS.OVERLOAD_MAX && !this.player.stunned) {
                    this.overloadExplode();
                }

                // Keyboard skills
                if (Phaser.Input.Keyboard.JustDown(this.keys.q)) this.useSkill(0);
                if (Phaser.Input.Keyboard.JustDown(this.keys.e)) this.useSkill(1);
                if (Phaser.Input.Keyboard.JustDown(this.keys.r)) this.useSkill(2);
                if (Phaser.Input.Keyboard.JustDown(this.keys.space)) this.useUltimate();
            }

            handleMovement() {
                let vx = 0, vy = 0;

                // Joystick
                if (this.joystickL.active) {
                    vx = this.joystickL.dx * CONSTANTS.PLAYER_SPEED;
                    vy = this.joystickL.dy * CONSTANTS.PLAYER_SPEED;
                }

                // Keyboard
                if (this.keys.w.isDown) vy = -CONSTANTS.PLAYER_SPEED;
                if (this.keys.s.isDown) vy = CONSTANTS.PLAYER_SPEED;
                if (this.keys.a.isDown) vx = -CONSTANTS.PLAYER_SPEED;
                if (this.keys.d.isDown) vx = CONSTANTS.PLAYER_SPEED;

                // Apply
                if (this.player.stunned) {
                    this.player.setVelocity(0);
                } else {
                    this.player.setVelocity(vx * this.player.speed, vy * this.player.speed);
                }

                // Aim with right joystick
                if (this.joystickR.active) {
                    this.player.rotation = Math.atan2(this.joystickR.dy, this.joystickR.dx);
                }
            }

            basicAttack() {
                if (this.player.energy < 5) return;
                
                this.player.energy -= 5;
                this.player.overload += 2;
                
                const angle = this.player.rotation;
                const bullet = this.bullets.create(
                    this.player.x + Math.cos(angle) * 40,
                    this.player.y + Math.sin(angle) * 40,
                    'bullet'
                );
                
                bullet.setVelocity(Math.cos(angle) * 500, Math.sin(angle) * 500);
                bullet.setTint(this.player.mage.color);
                bullet.damage = 10;
                bullet.owner = 'player';
                
                this.time.delayedCall(1000, () => bullet.destroy());
            }

            useSkill(index) {
                const keys = ['q', 'e', 'r'];
                const key = keys[index];
                
                if (this.cooldowns[key] > 0 || this.player.energy < 20) return;
                
                this.cooldowns[key] = 3000;
                this.player.energy -= 20;
                this.player.overload += 15;
                
                // Execute skill based on mage
                this.executeSkill(index);
            }

            useUltimate() {
                if (this.cooldowns.space > 0 || this.player.energy < 50) return;
                
                this.cooldowns.space = 15000;
                this.player.energy -= 50;
                this.player.overload += 30;
                
                this.executeUltimate();
            }

            executeSkill(index) {
                const angle = this.player.rotation;
                const mage = this.player.mage.id;
                
                // Visual effect
                this.createExplosion(this.player.x, this.player.y, 50, this.player.mage.color);
                
                switch(mage) {
                    case 'void':
                        if (index === 0) this.createGravityWell();
                        if (index === 1) this.shootVoidOrb();
                        if (index === 2) this.createShield();
                        break;
                    case 'flame':
                        if (index === 0) this.fireBeam();
                        if (index === 1) this.fireball();
                        if (index === 2) this.dash();
                        break;
                    case 'lightning':
                        if (index === 0) this.chainLightning();
                        if (index === 1) this.teleport();
                        if (index === 2) this.thunderStrike();
                        break;
                    case 'chrono':
                        if (index === 0) this.slowField();
                        if (index === 1) this.rewind();
                        if (index === 2) this.speedBoost();
                        break;
                    case 'nano':
                        if (index === 0) this.heal();
                        if (index === 1) this.summonDrone();
                        if (index === 2) this.barrier();
                        break;
                }
            }

            executeUltimate() {
                this.cameras.main.shake(500, 0.02);
                this.createExplosion(this.player.x, this.player.y, 200, 0xffffff);
                
                const mage = this.player.mage.id;
                
                if (mage === 'void') {
                    // Black hole - pull all enemies
                    this.enemies.getChildren().forEach(enemy => {
                        const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, enemy.x, enemy.y);
                        if (dist < 300) {
                            this.damageEnemy(enemy, 100);
                            enemy.stunned = true;
                            this.time.delayedCall(2000, () => enemy.stunned = false);
                        }
                    });
                } else if (mage === 'flame') {
                    // Supernova
                    this.enemies.getChildren().forEach(enemy => {
                        const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, enemy.x, enemy.y);
                        if (dist < 250) this.damageEnemy(enemy, 150);
                    });
                } else if (mage === 'lightning') {
                    // EMP
                    this.enemies.getChildren().forEach(enemy => {
                        enemy.stunned = true;
                        this.damageEnemy(enemy, 80);
                        this.time.delayedCall(3000, () => enemy.stunned = false);
                    });
                } else if (mage === 'chrono') {
                    // Time stop
                    this.enemies.getChildren().forEach(enemy => {
                        enemy.stunned = true;
                        this.time.delayedCall(3000, () => enemy.stunned = false);
                    });
                } else if (mage === 'nano') {
                    // Healing zone
                    this.heal(50);
                    this.time.addEvent({
                        delay: 500,
                        repeat: 5,
                        callback: () => this.heal(20)
                    });
                }
            }

            // Skill implementations
            createGravityWell() {
                const well = this.add.circle(this.player.x, this.player.y, 100, 0x9d00ff, 0.3);
                this.tweens.add({ targets: well, scale: 2, alpha: 0, duration: 2000, onComplete: () => well.destroy() });
                
                this.enemies.getChildren().forEach(enemy => {
                    const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, enemy.x, enemy.y);
                    if (dist < 200) {
                        const angle = Phaser.Math.Angle.Between(enemy.x, enemy.y, this.player.x, this.player.y);
                        enemy.body.velocity.x += Math.cos(angle) * 200;
                        enemy.body.velocity.y += Math.sin(angle) * 200;
                    }
                });
            }

            shootVoidOrb() {
                const angle = this.player.rotation;
                const orb = this.bullets.create(
                    this.player.x + Math.cos(angle) * 40,
                    this.player.y + Math.sin(angle) * 40,
                    'bullet'
                );
                orb.setTint(0x9d00ff);
                orb.setVelocity(Math.cos(angle) * 300, Math.sin(angle) * 300);
                orb.damage = 40;
                orb.owner = 'player';
                this.time.delayedCall(2000, () => orb.destroy());
            }

            createShield() {
                const shield = this.add.circle(this.player.x, this.player.y, 60, 0x9d00ff, 0.3);
                this.player.shield = true;
                this.time.delayedCall(3000, () => {
                    shield.destroy();
                    this.player.shield = false;
                });
            }

            fireBeam() {
                const beam = this.add.rectangle(
                    this.player.x + Math.cos(this.player.rotation) * 200,
                    this.player.y + Math.sin(this.player.rotation) * 200,
                    400, 30, 0xff4400, 0.5
                );
                beam.setRotation(this.player.rotation);
                
                this.enemies.getChildren().forEach(enemy => {
                    const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, enemy.x, enemy.y);
                    if (dist < 400) this.damageEnemy(enemy, 5);
                });
                
                this.time.delayedCall(1000, () => beam.destroy());
            }

            fireball() {
                const angle = this.player.rotation;
                const ball = this.bullets.create(
                    this.player.x + Math.cos(angle) * 40,
                    this.player.y + Math.sin(angle) * 40,
                    'bullet'
                );
                ball.setTint(0xff4400);
                ball.setScale(2);
                ball.setVelocity(Math.cos(angle) * 400, Math.sin(angle) * 400);
                ball.damage = 50;
                ball.owner = 'player';
                
                ball.explode = true;
                this.time.delayedCall(1500, () => {
                    if (ball.active) {
                        this.createExplosion(ball.x, ball.y, 100, 0xff4400);
                        ball.destroy();
                    }
                });
            }

            dash() {
                const angle = this.player.rotation;
                this.player.setVelocity(Math.cos(angle) * 800, Math.sin(angle) * 800);
                this.player.invulnerable = true;
                this.time.delayedCall(300, () => {
                    this.player.invulnerable = false;
                    this.player.setVelocity(0);
                });
            }

            chainLightning() {
                let targets = this.enemies.getChildren()
                    .sort((a, b) => {
                        const da = Phaser.Math.Distance.Between(this.player.x, this.player.y, a.x, a.y);
                        const db = Phaser.Math.Distance.Between(this.player.x, this.player.y, b.x, b.y);
                        return da - db;
                    })
                    .slice(0, 3);
                
                let lastX = this.player.x, lastY = this.player.y;
                targets.forEach(target => {
                    this.createLightning(lastX, lastY, target.x, target.y);
                    this.damageEnemy(target, 30);
                    lastX = target.x;
                    lastY = target.y;
                });
            }

            teleport() {
                const angle = this.player.rotation;
                this.createExplosion(this.player.x, this.player.y, 50, 0x00ffff);
                this.player.x += Math.cos(angle) * 200;
                this.player.y += Math.sin(angle) * 200;
                this.createExplosion(this.player.x, this.player.y, 50, 0x00ffff);
            }

            thunderStrike() {
                const angle = this.player.rotation;
                const targetX = this.player.x + Math.cos(angle) * 300;
                const targetY = this.player.y + Math.sin(angle) * 300;
                
                const marker = this.add.circle(targetX, targetY, 40, 0x00ffff, 0.3);
                this.time.delayedCall(500, () => {
                    marker.destroy();
                    this.createExplosion(targetX, targetY, 80, 0x00ffff);
                    this.enemies.getChildren().forEach(enemy => {
                        if (Phaser.Math.Distance.Between(targetX, targetY, enemy.x, enemy.y) < 80) {
                            this.damageEnemy(enemy, 60);
                        }
                    });
                });
            }

            slowField() {
                const field = this.add.circle(this.player.x, this.player.y, 150, 0xffd700, 0.2);
                this.enemies.getChildren().forEach(enemy => {
                    enemy.slowed = true;
                    enemy.speed = 0.5;
                });
                this.time.delayedCall(4000, () => {
                    field.destroy();
                    this.enemies.getChildren().forEach(enemy => {
                        enemy.slowed = false;
                        enemy.speed = 1;
                    });
                });
            }

            rewind() {
                this.heal(30);
                this.createExplosion(this.player.x, this.player.y, 100, 0xffd700);
            }

            speedBoost() {
                this.player.speed = 1.5;
                this.time.delayedCall(3000, () => this.player.speed = 1);
            }

            heal(amount = 30) {
                this.player.health = Math.min(this.player.health + amount, this.player.maxHealth);
                this.showFloatingText(this.player.x, this.player.y - 50, `+${amount}`, 0x00ff88);
            }

            summonDrone() {
                const drone = this.physics.add.sprite(this.player.x + 50, this.player.y, 'enemy');
                drone.setTint(0x00ff88);
                drone.setScale(0.7);
                drone.drone = true;
                drone.health = 50;
                
                this.time.addEvent({
                    delay: 1000,
                    callback: () => {
                        if (!drone.active) return;
                        const target = this.getNearestEnemy(drone);
                        if (target) {
                            const angle = Phaser.Math.Angle.Between(drone.x, drone.y, target.x, target.y);
                            const bullet = this.bullets.create(drone.x, drone.y, 'bullet');
                            bullet.setVelocity(Math.cos(angle) * 300, Math.sin(angle) * 300);
                            bullet.damage = 15;
                            bullet.owner = 'player';
                            this.time.delayedCall(1000, () => bullet.destroy());
                        }
                    },
                    repeat: 4
                });
                
                this.time.delayedCall(5000, () => drone.destroy());
            }

            barrier() {
                this.player.shield = true;
                this.time.delayedCall(4000, () => this.player.shield = false);
            }

            // Helper functions
            createExplosion(x, y, size, color) {
                const exp = this.add.circle(x, y, 10, color, 0.8);
                this.tweens.add({
                    targets: exp,
                    radius: size,
                    alpha: 0,
                    duration: 400,
                    onComplete: () => exp.destroy()
                });
            }

            createLightning(x1, y1, x2, y2) {
                const graphics = this.add.graphics();
                graphics.lineStyle(3, 0x00ffff);
                graphics.beginPath();
                graphics.moveTo(x1, y1);
                
                const segments = 5;
                for (let i = 1; i < segments; i++) {
                    const t = i / segments;
                    const mx = x1 + (x2 - x1) * t + (Math.random() - 0.5) * 30;
                    const my = y1 + (y2 - y1) * t + (Math.random() - 0.5) * 30;
                    graphics.lineTo(mx, my);
                }
                graphics.lineTo(x2, y2);
                graphics.strokePath();
                
                this.time.delayedCall(200, () => graphics.destroy());
            }

            getNearestEnemy(from) {
                let nearest = null;
                let minDist = Infinity;
                this.enemies.getChildren().forEach(enemy => {
                    const dist = Phaser.Math.Distance.Between(from.x, from.y, enemy.x, enemy.y);
                    if (dist < minDist) {
                        minDist = dist;
                        nearest = enemy;
                    }
                });
                return nearest;
            }

            updateEnemyAI(enemy) {
                if (!enemy.active || enemy.stunned) return;
                
                const dist = Phaser.Math.Distance.Between(enemy.x, enemy.y, this.player.x, this.player.y);
                const angle = Phaser.Math.Angle.Between(enemy.x, enemy.y, this.player.x, this.player.y);
                
                if (dist > 100) {
                    const speed = enemy.speed * (enemy.slowed ? 0.5 : 1);
                    enemy.setVelocity(Math.cos(angle) * enemy.speed, Math.sin(angle) * enemy.speed);
                } else {
                    enemy.setVelocity(0);
                }
                
                enemy.rotation = angle;
                
                // Shoot
                if (dist < 400 && Math.random() < 0.3) {
                    const bullet = this.bullets.create(enemy.x, enemy.y, 'bullet');
                    bullet.setTint(0xff0044);
                    bullet.setVelocity(Math.cos(angle) * 300, Math.sin(angle) * 300);
                    bullet.damage = enemy.isBoss ? 20 : 10;
                    bullet.owner = 'enemy';
                    this.time.delayedCall(2000, () => bullet.destroy());
                }
            }

            damageEnemy(enemy, damage) {
                enemy.health -= damage;
                enemy.setTint(0xffffff);
                this.time.delayedCall(100, () => enemy.setTint(enemy.isBoss ? 0xff00ff : 0xff0044));
                
                this.showFloatingText(enemy.x, enemy.y - 40, damage.toString(), 0xff0044);
                
                if (enemy.health <= 0) {
                    this.createExplosion(enemy.x, enemy.y, 60, enemy.isBoss ? 0xff00ff : 0xff0044);
                    enemy.destroy();
                    this.score++;
                    this.scoreText.setText(`Kills: ${this.score}`);
                    
                    if (this.enemies.countActive() === 0 && this.gameMode !== 'survival') {
                        this.showVictory();
                    }
                }
            }

            damagePlayer(amount) {
                if (this.player.invulnerable || this.player.shield) return;
                
                this.player.health -= amount;
                this.cameras.main.shake(100, 0.01);
                this.player.setTint(0xff0000);
                this.time.delayedCall(100, () => this.player.setTint(this.player.mage.color));
                
                this.showFloatingText(this.player.x, this.player.y - 50, `-${amount}`, 0xff0044);
                
                if (this.player.health <= 0) {
                    this.gameOver();
                }
            }

            overloadExplode() {
                this.player.stunned = true;
                this.damagePlayer(20);
                this.player.overload = 50;
                this.cameras.main.shake(500, 0.03);
                this.showMessage('OVERLOAD!', 0xff0044);
                
                this.time.delayedCall(2000, () => {
                    this.player.stunned = false;
                });
            }

            regenEnergy() {
                if (this.player.active) {
                    this.player.energy = Math.min(this.player.energy + 10, CONSTANTS.ENERGY_MAX);
                    this.player.overload = Math.max(this.player.overload - 5, 0);
                }
            }

            updateCooldowns(delta) {
                Object.keys(this.cooldowns).forEach(key => {
                    if (this.cooldowns[key] > 0) this.cooldowns[key] -= delta;
                });
            }

            updateUI() {
                // Health
                const hp = this.player.health / this.player.maxHealth;
                this.healthFill.setScale(hp, 1);
                this.healthFill.setTint(hp > 0.5 ? 0x00ff44 : 0xff0044);
                
                // Energy
                this.energyFill.setScale(this.player.energy / CONSTANTS.ENERGY_MAX, 1);
                
                // Overload
                const ol = this.player.overload / CONSTANTS.OVERLOAD_MAX;
                this.overloadFill.setAlpha(ol > 0 ? 0.7 : 0);
                this.overloadFill.setScale(Math.min(ol, 1), 1);
                this.warningText.setVisible(this.player.overload > CONSTANTS.OVERLOAD_THRESHOLD);
                
                // Skill cooldowns
                const keys = ['q', 'e', 'r'];
                this.skillButtons.forEach((btn, i) => {
                    const cd = this.cooldowns[keys[i]];
                    btn.cooldownOverlay.setVisible(cd > 0);
                    if (cd > 0) {
                        btn.cooldownOverlay.setScale(1, cd / 3000);
                    }
                });
                
                // Ultimate
                this.ultCd.setVisible(this.cooldowns.space > 0);
                if (this.cooldowns.space > 0) {
                    this.ultCd.setScale(1, this.cooldowns.space / 15000);
                }
            }

            showFloatingText(x, y, text, color) {
                const txt = this.add.text(x, y, text, {
                    fontSize: '20px',
                    fontStyle: 'bold',
                    color: '#' + color.toString(16).padStart(6, '0')
                }).setOrigin(0.5);
                
                this.tweens.add({
                    targets: txt,
                    y: y - 60,
                    alpha: 0,
                    duration: 800,
                    onComplete: () => txt.destroy()
                });
            }

            showMessage(text, color) {
                const msg = this.add.text(this.cameras.main.centerX, this.cameras.main.centerY - 100, text, {
                    fontSize: '32px',
                    fontStyle: 'bold',
                    color: '#' + color.toString(16).padStart(6, '0')
                }).setOrigin(0.5).setScrollFactor(0);
                
                this.tweens.add({
                    targets: msg,
                    scale: 1.5,
                    alpha: 0,
                    duration: 1000,
                    onComplete: () => msg.destroy()
                });
            }

            showVictory() {
                this.add.rectangle(this.cameras.main.centerX, this.cameras.main.centerY, 
                    this.cameras.main.width, this.cameras.main.height, 0x000000, 0.8).setScrollFactor(0);
                
                this.add.text(this.cameras.main.centerX, this.cameras.main.centerY - 50, 'VICTORY!', {
                    fontSize: '48px',
                    color: '#00ff88',
                    fontStyle: 'bold'
                }).setOrigin(0.5).setScrollFactor(0);
                
                this.add.text(this.cameras.main.centerX, this.cameras.main.centerY + 20, 
                    `Kills: ${this.score}`, {
                    fontSize: '24px',
                    color: '#ffffff'
                }).setOrigin(0.5).setScrollFactor(0);
                
                const restart = this.add.text(this.cameras.main.centerX, this.cameras.main.centerY + 100, 
                    'PLAY AGAIN', {
                    fontSize: '24px',
                    color: '#00aaff',
                    backgroundColor: '#1a1a3a',
                    padding: { x: 20, y: 10 }
                }).setOrigin(0.5).setScrollFactor(0).setInteractive();
                
                restart.on('pointerdown', () => this.scene.restart());
            }

            gameOver() {
                this.player.destroy();
                
                this.add.rectangle(this.cameras.main.centerX, this.cameras.main.centerY, 
                    this.cameras.main.width, this.cameras.main.height, 0x000000, 0.9).setScrollFactor(0);
                
                this.add.text(this.cameras.main.centerX, this.cameras.main.centerY - 50, 'DEFEAT', {
                    fontSize: '48px',
                    color: '#ff0044',
                    fontStyle: 'bold'
                }).setOrigin(0.5).setScrollFactor(0);
                
                const restart = this.add.text(this.cameras.main.centerX, this.cameras.main.centerY + 50, 
                    'TRY AGAIN', {
                    fontSize: '24px',
                    color: '#00aaff',
                    backgroundColor: '#1a1a3a',
                    padding: { x: 20, y: 10 }
                }).setOrigin(0.5).setScrollFactor(0).setInteractive();
                
                restart.on('pointerdown', () => this.scene.restart());
            }
        }

        // ==========================================
        // GAME CONFIG
        // ==========================================
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            parent: 'game-container',
            backgroundColor: '#050510',
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { x: 0, y: 0 },
                    debug: false
                }
            },
            scale: {
                mode: Phaser.Scale.RESIZE,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            scene: [BootScene, MenuScene, SelectScene, GameScene]
        };

        const game = new Phaser.Game(config);

        window.addEventListener('resize', () => {
            game.scale.resize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
